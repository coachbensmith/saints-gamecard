<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<title>Saints — Practice Plan Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0A1E3C;--gold:#C9A84C;--gold-l:#FEFCE8;
  --green:#1A5C3A;--green-l:#EBF7F0;
  --blue:#1D4E89;--blue-l:#EBF2FB;
  --purple:#5B2D8E;--purp-l:#F3EEFF;
  --red:#8B1A1A;--red-l:#FEF2F2;
  --teal:#0F766E;--teal-l:#F0FDFA;
  --orange:#92400E;--orange-l:#FFFBEB;
  --lgray:#F4F4F4;--mgray:#999;--dgray:#333;
}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#E0E0E0;min-height:100vh;font-size:14px;color:var(--dgray);}
button,input,select,textarea{font-family:inherit;}

/* TOPBAR */
.topbar{background:var(--navy);border-bottom:4px solid var(--gold);padding:12px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
.topbar-eyebrow{color:var(--gold);font-size:8px;letter-spacing:3px;text-transform:uppercase;display:block;margin-bottom:2px;}
.topbar-title{color:#fff;font-weight:bold;font-size:17px;}

/* BUTTONS */
.btn{border:none;border-radius:4px;padding:7px 14px;font-size:13px;font-weight:bold;cursor:pointer;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--gold);color:var(--gold);}
.btn-ghost-sm{background:transparent;border:1px solid #ccc;color:#555;padding:4px 9px;font-size:12px;font-weight:normal;}
.btn-navy-sm{background:var(--navy);color:#fff;padding:4px 9px;font-size:12px;}
.btn-danger-sm{background:#dc2626;color:#fff;padding:4px 9px;font-size:12px;}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-icon{background:transparent;border:none;cursor:pointer;padding:3px 5px;font-size:14px;color:#aaa;}
.btn-icon:hover{color:var(--navy);}

/* INPUTS */
.inp{border:1px solid #ddd;border-radius:4px;padding:6px 10px;font-size:13px;outline:none;background:#fff;}
.inp-dark{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:4px;padding:5px 10px;font-size:13px;outline:none;}
.inp-dark::placeholder{color:rgba(255,255,255,.4);}
.inp-sm{padding:4px 8px;font-size:12px;border:1px solid #ddd;border-radius:3px;background:#fff;}
textarea.inp{resize:vertical;min-height:52px;}

/* CONTENT AREA */
.content{max-width:900px;margin:22px auto;padding:0 16px;}
.section-label{color:var(--navy);font-weight:bold;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}

/* HOME PLAN CARDS */
.plan-card{background:#fff;border:1px solid #ddd;border-left:4px solid var(--gold);border-radius:5px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:8px;}
.plan-name{font-weight:bold;font-size:15px;color:var(--navy);}
.plan-meta{color:var(--mgray);font-size:11px;margin-top:3px;}
.plan-actions{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.empty-state{text-align:center;padding:60px 0;color:#888;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.empty-title{font-size:18px;font-weight:bold;color:var(--navy);margin-bottom:6px;}

/* TABS */
.tab-bar{display:flex;border-bottom:2px solid #ddd;margin-bottom:16px;}
.tab{padding:8px 18px;font-size:13px;font-weight:bold;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:#999;}
.tab.active{color:var(--navy);border-bottom-color:var(--gold);}

/* SEGMENT ROWS */
.seg-list{display:flex;flex-direction:column;gap:6px;}
.seg-card{background:#fff;border:1px solid #ddd;border-radius:5px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.seg-main{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;}
.seg-clock{font-size:19px;font-weight:bold;color:var(--navy);min-width:60px;font-variant-numeric:tabular-nums;font-family:'Courier New',monospace;}
.seg-name{font-weight:bold;font-size:13px;color:var(--navy);flex:1;}
.seg-dur{font-size:12px;color:var(--mgray);white-space:nowrap;}
.seg-tag{font-size:9px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:2px;margin-left:4px;}
.seg-team-tag{background:var(--gold-l);color:var(--orange);border:1px solid #f5d04a;}
.seg-detail{padding:10px 12px 12px 80px;border-top:1px solid #f0f0f0;background:#fafafa;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.seg-detail-full{grid-column:1/-1;}
.detail-label{font-size:9px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;color:var(--mgray);margin-bottom:3px;}
.detail-val{font-size:12px;color:var(--dgray);}
.seg-controls{display:flex;gap:2px;align-items:center;}

/* TOTALS BAR */
.totals-bar{background:var(--navy);color:#fff;border-radius:5px;padding:9px 14px;display:flex;align-items:center;gap:16px;margin-bottom:12px;font-size:12px;}
.totals-item{display:flex;flex-direction:column;align-items:center;}
.totals-num{font-size:18px;font-weight:bold;color:var(--gold);font-family:'Courier New',monospace;}
.totals-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-top:1px;}
.totals-warn{color:#f99;font-size:11px;flex:1;}

/* ROSTER TAB */
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:18px;}
.att-card{border:1px solid #ddd;border-radius:5px;padding:8px 10px;display:flex;align-items:center;gap:8px;background:#fff;}
.att-num{background:var(--navy);color:var(--gold);font-weight:bold;font-size:11px;border-radius:3px;padding:2px 5px;min-width:28px;text-align:center;}
.att-name{font-size:12px;font-weight:500;color:var(--navy);flex:1;}
.att-btn{font-size:11px;font-weight:bold;padding:3px 7px;border:none;border-radius:3px;cursor:pointer;}
.att-present{background:#dcfce7;color:#166534;}
.att-limited{background:#fef9c3;color:#854d0e;}
.att-absent{background:#fee2e2;color:#991b1b;}

/* GROUPS */
.groups-config{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.group-block{border:1px solid #ddd;border-radius:5px;background:#fff;overflow:hidden;margin-bottom:8px;}
.group-hdr{background:var(--lgray);padding:6px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #ddd;}
.group-members{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;min-height:36px;}
.group-chip{background:var(--navy);color:#fff;font-size:11px;border-radius:3px;padding:2px 8px;}
.player-assign-row{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid #f5f5f5;background:#fff;}
.player-assign-row:last-child{border-bottom:none;}

/* SHOOTING STATS TABLE */
.stats-table{width:100%;border-collapse:collapse;background:#fff;border-radius:5px;overflow:hidden;border:1px solid #ddd;font-size:12px;}
.stats-table th{background:var(--navy);color:#fff;padding:7px 8px;text-align:center;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:bold;}
.stats-table th.left{text-align:left;}
.stats-table td{padding:6px 8px;text-align:center;border-bottom:1px solid #f0f0f0;}
.stats-table td.left{text-align:left;font-weight:500;color:var(--navy);}
.stats-table tr:last-child td{border-bottom:none;}
.stats-table tr.total-row td{background:var(--lgray);font-weight:bold;color:var(--navy);border-top:2px solid #ddd;}
.stats-table tr.absent-row td{opacity:.4;}
.stat-inp{width:42px;text-align:center;border:1px solid #ddd;border-radius:3px;padding:3px 4px;font-size:12px;}
.pct-cell{color:var(--mgray);font-size:11px;}

/* LIBRARY VIEW */
.lib-card{background:#fff;border:1px solid #ddd;border-left:4px solid var(--green);border-radius:5px;padding:10px 14px;margin-bottom:7px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.lib-name{font-weight:bold;font-size:13px;color:var(--navy);}
.lib-meta{font-size:11px;color:var(--mgray);margin-top:2px;}
.cat-badge{display:inline-block;font-size:9px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:2px;margin-right:4px;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#fff;border-radius:6px;width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal-hdr{background:var(--navy);padding:13px 16px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-radius:6px 6px 0 0;}
.modal-hdr-title{color:#fff;font-weight:bold;font-size:14px;}
.modal-body{overflow-y:auto;padding:16px;flex:1;}
.modal-footer{padding:12px 16px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}
.field{margin-bottom:13px;}
.field-label{font-size:11px;font-weight:bold;color:var(--navy);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.toggle-group{display:flex;border:1px solid #ddd;border-radius:4px;overflow:hidden;}
.toggle-opt{flex:1;padding:6px;text-align:center;font-size:12px;font-weight:bold;cursor:pointer;border:none;background:#fff;color:#999;}
.toggle-opt.active{background:var(--navy);color:#fff;}
.drill-list{border:1px solid #ddd;border-radius:4px;max-height:200px;overflow-y:auto;}
.drill-opt{padding:8px 10px;cursor:pointer;border-bottom:1px solid #f5f5f5;font-size:12px;}
.drill-opt:hover{background:var(--lgray);}
.drill-opt.selected{background:var(--blue-l);font-weight:bold;color:var(--navy);}
.drill-opt:last-child{border-bottom:none;}

/* ROSTER SIDE PANEL */
.side-panel{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:flex-end;}
.side-body{background:#fff;width:320px;height:100vh;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.18);display:flex;flex-direction:column;}
.side-hdr{background:var(--navy);padding:13px 16px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.side-hdr-title{color:#fff;font-weight:bold;font-size:14px;}
.side-form{padding:13px 14px;border-bottom:1px solid #eee;background:#fafafa;flex-shrink:0;}
.side-form-title{font-weight:bold;font-size:11px;color:var(--navy);letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;}
.roster-type-hdr{padding:5px 14px;font-size:9px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:var(--mgray);background:#f5f5f5;border-top:1px solid #eee;border-bottom:1px solid #eee;}
.roster-player{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid #f5f5f5;}
.roster-num{background:var(--navy);color:var(--gold);font-weight:bold;font-size:12px;border-radius:3px;padding:2px 5px;margin-right:10px;min-width:30px;text-align:center;}

/* PRINT */
@media print{
  .no-print{display:none!important;}
  body{background:#fff;margin:0;width:739px!important;-webkit-text-size-adjust:none;text-size-adjust:none;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  @page{margin:0.4in;size:letter portrait;}
  .print-wrap{max-width:100%;width:100%;margin:0;box-shadow:none;}

  /* Header */
  .print-hdr{padding:9pt 14pt;border-bottom-width:3pt;}
  .print-hdr-left .eyebrow{font-size:7pt;letter-spacing:2pt;margin-bottom:2pt;}
  .print-hdr-left .title{font-size:14pt;}
  .print-hdr-right .opp{font-size:12pt;}
  .print-hdr-right .sub{font-size:8pt;margin-top:2pt;}

  /* Practice table — table-layout:fixed keeps columns from overflowing */
  .print-body{padding:6pt 10pt;}
  .plan-table{
    width:100%;
    table-layout:fixed;
    font-size:9pt;
    border-collapse:collapse;
    margin-bottom:0;
  }
  .plan-table th{padding:5pt 6pt;font-size:7.5pt;letter-spacing:0.5pt;}
  /* Column widths: clock=52pt, segment=auto, min=22pt, setup=155pt, emphasis=auto */
  .plan-table th:nth-child(1),.plan-table td:nth-child(1){width:52pt;}
  .plan-table th:nth-child(3),.plan-table td:nth-child(3){width:22pt;}
  .plan-table th:nth-child(4),.plan-table td:nth-child(4){width:155pt;}

  /* Rows: padding sized for ~17 rows with some wrapping → fills 75-90% */
  .plan-table tr{break-inside:avoid;page-break-inside:avoid;}
  .plan-table td{
    padding:12pt 6pt!important;
    vertical-align:middle!important;
    border-bottom:0.5pt solid #ddd!important;
    word-wrap:break-word;
    overflow-wrap:break-word;
  }
  .plan-table td.clock{font-size:13pt!important;font-weight:bold!important;text-align:center!important;white-space:nowrap!important;padding:12pt 6pt!important;}
  .plan-table td.dur{font-size:10pt!important;font-weight:bold!important;text-align:center!important;padding:12pt 6pt!important;}
  .team-goal-print{font-size:8pt;}
  .plan-table tr.team-row td{background:#FFFBEB!important;}

  /* Page 2: section headers */
  .print-section-hdr{padding:5pt 8pt;font-size:8.5pt;letter-spacing:2pt;margin:5pt 0 7pt;}

  /* Partners & groups */
  .print-groups{gap:9pt;margin-bottom:11pt;}
  .print-group{padding:6pt 9pt;}
  .print-group-name{font-size:8.5pt;margin-bottom:3pt;}
  .print-group-players{font-size:8.5pt;line-height:1.45;}

  /* Stats table — 11 players + header + total = 13 rows */
  .stats-table{font-size:8.5pt;width:100%;}
  .stats-table th{padding:5pt 6pt;font-size:7.5pt;}
  .stats-table td{padding:7pt 6pt;}

  /* Footer */
  .print-footer{padding:4pt 12pt;border-top-width:0.5pt;}
  .print-footer-text{font-size:7pt;}
}

<div id="app"></div>
<script>
// ── CATEGORIES ────────────────────────────────────────────────────────────────
const CATEGORIES=['Warmup','Ball Handling','Passing','Shooting','Finishing','Offense','Defense','Rebounding','Conditioning','Scrimmage','Team','Special Situations','Other'];
const CAT_COLOR={
  'Warmup':'#92400E','Ball Handling':'#1D4E89','Shooting':'#1A5C3A',
  'Offense':'#0A1E3C','Defense':'#8B1A1A','Conditioning':'#5B2D8E',
  'Passing':'#0369A1','Finishing':'#B45309','Scrimmage':'#0F766E','Special Situations':'#C9A84C','Other':'#666'
};
const CAT_BG={
  'Warmup':'#FFFBEB','Ball Handling':'#EBF2FB','Shooting':'#EBF7F0',
  'Offense':'#E8EDF5','Defense':'#FEF2F2','Conditioning':'#F3EEFF',
  'Passing':'#E0F2FE','Finishing':'#FEF3C7','Scrimmage':'#F0FDFA','Special Situations':'#FEFCE8','Other':'#F4F4F4'
};

// ── STORAGE ───────────────────────────────────────────────────────────────────

// ── UTILS ─────────────────────────────────────────────────────────────────────
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const fmtDate=d=>{try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}catch{return d||'';}};
const fmtScore=mins=>{const m=Math.max(0,Math.round(mins));return m.toString().padStart(2,'0')+':00';};
const pct=(m,a)=>a>0?Math.round(m/a*100)+'%':'—';

function mkPlan(){
  const mkGing=(name,n)=>({id:uid(),name,groups:Array.from({length:n},(_,i)=>({id:uid(),name:'Group '+(i+1),playerIds:[]}))});
  return{id:uid(),date:'',startTime:'',totalMinutes:90,location:'',notes:'',segments:[],
    attendance:{},partners:[],groups:[],teams:{navy:[],white:[],gold:[]},
    shootingStats:{},createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
}
function mkSeg(){
  return{id:uid(),type:'custom',drillId:null,name:'',duration:10,setup:'',emphasis:'',isTeam:false,teamGoal:''};
}
function calcScoreboards(segs,total){
  const times=[];let elapsed=0;
  for(const s of segs){times.push(total-elapsed);elapsed+=parseInt(s.duration)||0;}
  return times;
}
function totalUsed(segs){return segs.reduce((a,s)=>a+(parseInt(s.duration)||0),0);}

function setState(patch){
  const sy=window.scrollY;
  Object.assign(S,patch);
  if(patch.roster!==undefined)persist(SK.roster,S.roster);
  if(patch.plans!==undefined)persist(SK.plans,S.plans);
  if(patch.library!==undefined)persist(SK.library,S.library);
  render();
  window.scrollTo(0,sy);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  let html='';
  if(S.view==='home')    html=renderHome();
  if(S.view==='builder') html=renderBuilder();
  if(S.view==='library') html=renderLibrary();
  if(S.view==='print')   html=renderPrint();
  if(S.showRoster)       html+=renderRosterPanel();
  if(S.showSegModal)     html+=renderSegModal();
  if(S.showLibModal)     html+=renderLibModal();
  // Save scroll positions of any open scrollable panels/modals
  const _sb=document.querySelector('.side-body');
  const _sbSc=_sb?_sb.scrollTop:0;
  const _mb=document.querySelector('.modal-body');
  const _mbSc=_mb?_mb.scrollTop:0;
  document.getElementById('app').innerHTML=html;
  // Restore scroll positions after re-render
  const _sbNew=document.querySelector('.side-body');
  if(_sbNew) _sbNew.scrollTop=_sbSc;
  const _mbNew=document.querySelector('.modal-body');
  if(_mbNew) _mbNew.scrollTop=_mbSc;
  attachHandlers();
}

function renderSeasonStats(){
  const roster=[...S.roster].sort((a,b)=>a.number-b.number);
  const plans=S.plans;
  if(!plans.length) return `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No plans yet</div></div>`;

  // Aggregate stats across all plans
  const totals={};
  roster.forEach(r=>{totals[r.id]={ftm:0,fta:0,tpm:0,tpa:0,practices:0};});
  plans.forEach(p=>{
    const stats=p.shootingStats||{};
    const att=p.attendance||{};
    roster.forEach(r=>{
      if((att[r.id]||'present')!=='absent'){
        if(totals[r.id]) totals[r.id].practices++;
      }
      const s=stats[r.id];
      if(s&&totals[r.id]){
        totals[r.id].ftm+=(s.ft?.makes||0);
        totals[r.id].fta+=(s.ft?.attempts||0);
        totals[r.id].tpm+=(s.tp?.makes||0);
        totals[r.id].tpa+=(s.tp?.attempts||0);
      }
    });
  });

  const pct=(m,a)=>a>0?Math.round(m/a*100)+'%':'—';
  const bar=(m,a,color)=>{
    if(!a) return '<span style="color:#ccc">—</span>';
    const w=Math.round(m/a*100);
    return `<div style="display:flex;align-items:center;gap:6px">
      <div style="flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden">
        <div style="width:${w}%;height:100%;background:${color};border-radius:3px"></div>
      </div>
      <span style="font-size:11px;min-width:36px;text-align:right">${pct(m,a)}</span>
    </div>`;
  };

  const teamTotals={ftm:0,fta:0,tpm:0,tpa:0};
  roster.forEach(r=>{const t=totals[r.id]||{};teamTotals.ftm+=t.ftm||0;teamTotals.fta+=t.fta||0;teamTotals.tpm+=t.tpm||0;teamTotals.tpa+=t.tpa||0;});

  return `
    <div style="background:#fff;border-radius:8px;border:1px solid #E0E0E0;overflow:hidden;margin-bottom:16px">
      <div style="background:var(--navy);padding:10px 16px;display:flex;align-items:center;justify-content:space-between">
        <span style="color:#fff;font-weight:bold;font-size:14px">Season Shooting Stats</span>
        <span style="color:rgba(255,255,255,.55);font-size:12px">${plans.length} practice${plans.length!==1?'s':''}</span>
      </div>
      <div style="overflow-x:auto">
        <table class="stats-table" style="width:100%">
          <thead><tr>
            <th style="text-align:left;width:28px">#</th>
            <th style="text-align:left">Player</th>
            <th>Prac.</th>
            <th>FT M</th><th>FT A</th><th style="min-width:120px">FT %</th>
            <th>3P M</th><th>3P A</th><th style="min-width:120px">3P %</th>
          </tr></thead>
          <tbody>
            ${roster.map((r,i)=>{
              const t=totals[r.id]||{};
              return`<tr class="${i%2===1?'stripe-row':''}">
                <td class="left">${r.number}</td>
                <td class="left">${esc(r.name)}</td>
                <td>${t.practices||0}</td>
                <td>${t.ftm||0}</td><td>${t.fta||0}</td><td>${bar(t.ftm,t.fta,'var(--navy)')}</td>
                <td>${t.tpm||0}</td><td>${t.tpa||0}</td><td>${bar(t.tpm,t.tpa,'var(--gold)')}</td>
              </tr>`;
            }).join('')}
            <tr class="total-row">
              <td colspan="2" class="left">Team Total</td>
              <td>—</td>
              <td><b>${teamTotals.ftm}</b></td><td><b>${teamTotals.fta}</b></td><td>${bar(teamTotals.ftm,teamTotals.fta,'var(--navy)')}</td>
              <td><b>${teamTotals.tpm}</b></td><td><b>${teamTotals.tpa}</b></td><td>${bar(teamTotals.tpm,teamTotals.tpa,'var(--gold)')}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

            const pl=roster.find(r=>r.id===pid);

          }).join('')}
        </div>
      </div>`).join('')}
    ${groups.length>0?`
      <div style="border:1px solid #ddd;border-radius:5px;background:#fff;margin-bottom:20px">
        <div style="padding:6px 12px;background:var(--lgray);border-bottom:1px solid #eee;font-size:9px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;color:var(--mgray)">Assign Players to Groups</div>
        ${presentPlayers.map(pl=>{
          const inGrp=groups.find(g=>(g.playerIds||[]).includes(pl.id));
          return`<div class="player-assign-row">
            <span class="att-num">#${pl.number}</span>
            <span style="flex:1;font-size:12px;font-weight:500;color:var(--navy)">${esc(pl.name)}</span>
            <select class="inp-sm" data-a="assign-group" data-pid="${pl.id}">
              <option value="">— Unassigned —</option>
              ${groups.map(g=>`<option value="${g.id}" ${inGrp&&inGrp.id===g.id?'selected':''}>${esc(g.name)}</option>`).join('')}
            </select>
          </div>`;
        }).join('')}
      </div>`:'<div style="margin-bottom:20px"></div>'}`;

  // ── Shooting Stats ────────────────────────────────────────────────────────
  const stats=p.shootingStats||{};
  const getStat=(pid,cat,field)=>(stats[pid]&&stats[pid][cat]?stats[pid][cat][field]:0)||0;
  let teamFTM=0,teamFTA=0,teamTPM=0,teamTPA=0;
  presentPlayers.forEach(pl=>{
    teamFTM+=getStat(pl.id,'ft','makes');
    teamFTA+=getStat(pl.id,'ft','attempts');
    teamTPM+=getStat(pl.id,'tp','makes');
    teamTPA+=getStat(pl.id,'tp','attempts');
  });

  // ── Teams ──────────────────────────────────────────────────────────────────
  const teams=p.teams||{navy:[],white:[],gold:[]};
  const navyIds=teams.navy||[];
  const whiteIds=teams.white||[];
  const getTeam=pid=>navyIds.includes(pid)?'navy':whiteIds.includes(pid)?'white':(p.teams?.gold||[]).includes(pid)?'gold':'';
  const teamsHtml=`
    <div class="section-label" style="margin-bottom:10px">Teams</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
      <div style="border:2px solid #0A1E3C;border-radius:6px;overflow:hidden">
        <div style="background:#0A1E3C;padding:7px 12px;display:flex;align-items:center;justify-content:space-between">
          <span style="color:#fff;font-weight:bold;font-size:13px">🟦 Blue Team</span>
          <span style="color:rgba(255,255,255,.55);font-size:11px">${navyIds.length} player${navyIds.length!==1?'s':''}</span>
        </div>
        <div style="padding:8px;display:flex;flex-wrap:wrap;gap:5px;min-height:44px;background:#E8EDF5">
          ${navyIds.map(pid=>{
            const pl=roster.find(r=>r.id===pid);
            return pl?`<span style="background:#0A1E3C;color:#fff;font-size:11px;border-radius:3px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px">#${pl.number} ${esc(pl.name)}<span data-a="remove-from-team" data-pid="${pid}" data-team="navy" style="cursor:pointer;opacity:.6;font-size:10px">✕</span></span>`:'';
          }).join('')}
        </div>
      </div>
      <div style="border:2px solid #64748B;border-radius:6px;overflow:hidden">
        <div style="background:#64748B;padding:7px 12px;display:flex;align-items:center;justify-content:space-between">
          <span style="color:#fff;font-weight:bold;font-size:13px">⚪ White Team</span>
          <span style="color:rgba(255,255,255,.55);font-size:11px">${whiteIds.length} player${whiteIds.length!==1?'s':''}</span>
        </div>
        <div style="padding:8px;display:flex;flex-wrap:wrap;gap:5px;min-height:44px;background:#F8FAFC">
          ${whiteIds.map(pid=>{
            const pl=roster.find(r=>r.id===pid);
            return pl?`<span style="background:#64748B;color:#fff;font-size:11px;border-radius:3px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px">#${pl.number} ${esc(pl.name)}<span data-a="remove-from-team" data-pid="${pid}" data-team="white" style="cursor:pointer;opacity:.6;font-size:10px">✕</span></span>`:'';
          }).join('')}
        </div>
      </div>
      <div style="border:2px solid #C9A84C;border-radius:6px;overflow:hidden">
        <div style="background:#C9A84C;padding:7px 12px;display:flex;align-items:center;justify-content:space-between">
          <span style="color:#0A1E3C;font-weight:bold;font-size:13px">🟡 Gold Team</span>
          <span style="color:rgba(10,30,60,.55);font-size:11px">${(p.teams?.gold||[]).length} player${(p.teams?.gold||[]).length!==1?'s':''}</span>
        </div>
        <div style="padding:8px;display:flex;flex-wrap:wrap;gap:5px;min-height:44px;background:#FEFCE8">
          ${(p.teams?.gold||[]).map(pid=>{
            const pl=roster.find(r=>r.id===pid);
            return pl?`<span style="background:#C9A84C;color:#0A1E3C;font-size:11px;border-radius:3px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px;font-weight:bold">#${pl.number} ${esc(pl.name)}<span data-a="remove-from-team" data-pid="${pid}" data-team="gold" style="cursor:pointer;opacity:.6;font-size:10px">✕</span></span>`:'';
          }).join('')}
        </div>
      </div>
    </div>
    <div style="border:1px solid #ddd;border-radius:5px;background:#fff;margin-bottom:20px">
      <div style="padding:6px 12px;background:var(--lgray);border-bottom:1px solid #eee;font-size:9px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;color:var(--mgray)">Assign Players to Teams</div>
      ${presentPlayers.map(pl=>`
        <div style="display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid #f5f5f5">
          <span class="att-num">#${pl.number}</span>
          <span style="flex:1;font-size:12px;font-weight:500;color:var(--navy)">${esc(pl.name)}</span>
          <select class="inp-sm" data-a="assign-team" data-pid="${pl.id}">
            <option value="" ${getTeam(pl.id)===''?'selected':''}>— Unassigned —</option>
            <option value="navy" ${getTeam(pl.id)==='navy'?'selected':''}>🟦 Blue</option>
            <option value="white" ${getTeam(pl.id)==='white'?'selected':''}>⚪ White</option>
            <option value="gold" ${getTeam(pl.id)==='gold'?'selected':''}>🟡 Gold</option>
          </select>
        </div>`).join('')}
    </div>`;

  const statsHtml=`
    <div class="section-label">Shooting Stats</div>
    <table class="stats-table">
      <thead>
        <tr>
          <th class="left" colspan="2">Player</th>
          <th colspan="3">Free Throws</th>
          <th colspan="3">3-Pointers</th>
        </tr>
        <tr>
          <th class="left">#</th><th class="left">Name</th>
          <th>Makes</th><th>Att</th><th>%</th>
          <th>Makes</th><th>Att</th><th>%</th>
        </tr>
      </thead>
      <tbody>
        ${roster.map(pl=>{
          const absent=getAtt(pl.id)==='absent';
          const ftm=getStat(pl.id,'ft','makes'),fta=getStat(pl.id,'ft','attempts');
          const tpm=getStat(pl.id,'tp','makes'),tpa=getStat(pl.id,'tp','attempts');
          return`<tr class="${absent?'absent-row':''}">
            <td class="left">${pl.number}</td>
            <td class="left">${esc(pl.name)}</td>
            <td><input type="number" class="stat-inp" min="0" data-stat="ft-makes" data-pid="${pl.id}" value="${ftm}" ${absent?'disabled':''}></td>
            <td><input type="number" class="stat-inp" min="0" data-stat="ft-attempts" data-pid="${pl.id}" value="${fta}" ${absent?'disabled':''}></td>
            <td class="pct-cell">${absent?'—':pct(ftm,fta)}</td>
            <td><input type="number" class="stat-inp" min="0" data-stat="tp-makes" data-pid="${pl.id}" value="${tpm}" ${absent?'disabled':''}></td>
            <td><input type="number" class="stat-inp" min="0" data-stat="tp-attempts" data-pid="${pl.id}" value="${tpa}" ${absent?'disabled':''}></td>
            <td class="pct-cell">${absent?'—':pct(tpm,tpa)}</td>
          </tr>`;
        }).join('')}
        <tr class="total-row">
          <td colspan="2" class="left">Team Total</td>
          <td>${teamFTM}</td><td>${teamFTA}</td><td class="pct-cell">${pct(teamFTM,teamFTA)}</td>
          <td>${teamTPM}</td><td>${teamTPA}</td><td class="pct-cell">${pct(teamTPM,teamTPA)}</td>
        </tr>
      </tbody>
    </table>`;

  return attHtml+partnersHtml+groupsHtml+teamsHtml+statsHtml;
}

// ── LIBRARY VIEW ──────────────────────────────────────────────────────────────

  return`
  <div class="topbar">
    <button class="btn btn-ghost btn-sm" data-a="go-home">← Back</button>

    </div>
    ${drills.length===0?`<div style="text-align:center;padding:40px 0;color:#aaa;font-size:13px">${S.library.length===0?'No drills yet — add your first one.':'No drills in this category.'}</div>`:''}

// ── PRINT VIEW ────────────────────────────────────────────────────────────────
function renderPrint(){
  const p=S.plan;
  const segs=p.segments;
  const times=calcScoreboards(segs,parseInt(p.totalMinutes)||0);
  const roster=[...S.roster].sort((a,b)=>a.number-b.number);
  const att=p.attendance||{};
  const getAtt=pid=>att[pid]||'present';
  const presentPlayers=roster.filter(r=>getAtt(r.id)!=='absent');
  const groups=p.groups||[];
  const stats=p.shootingStats||{};
  const getStat=(pid,cat,field)=>(stats[pid]&&stats[pid][cat]?stats[pid][cat][field]:0)||0;
  let teamFTM=0,teamFTA=0,teamTPM=0,teamTPA=0;
  presentPlayers.forEach(pl=>{
    teamFTM+=getStat(pl.id,'ft','makes'); teamFTA+=getStat(pl.id,'ft','attempts');
    teamTPM+=getStat(pl.id,'tp','makes'); teamTPA+=getStat(pl.id,'tp','attempts');
  });

  return`
  <div class="no-print" style="background:var(--navy);padding:10px 18px;display:flex;gap:10px;align-items:center;border-bottom:3px solid var(--gold)">
    <button class="btn btn-ghost btn-sm" data-a="go-builder">← Back</button>
    <span style="color:#fff;font-weight:bold;flex:1">${p.date?fmtDate(p.date):'Practice Plan'} — Print Preview</span>
    <button class="btn btn-gold" onclick="downloadPDF()">⬇ Download PDF</button>
  </div>
  <div class="print-wrap">
    <div class="print-hdr">
      <div class="print-hdr-left">
        <div class="eyebrow">Bishop Dwenger High School · Fort Wayne, Indiana</div>
        <div class="title">Boys' Basketball — Practice Plan</div>
      </div>
      <div class="print-hdr-right">
        <div class="opp">${p.date?fmtDate(p.date):'—'}${p.location?' · '+esc(p.location):''}</div>
        <div class="sub">${p.startTime?'Start: '+p.startTime+' &nbsp;·&nbsp; ':''}Total: ${p.totalMinutes||0} min &nbsp;·&nbsp; Ben Smith · Head Coach</div>
      </div>
    </div>
    <div class="print-body">
      <table class="plan-table">
        <thead>
          <tr>
            <th class="center" style="width:70px">Clock</th>
            <th>Segment</th>
            <th class="center" style="width:44px">Min</th>
            <th style="width:180px">Setup / Equipment</th>
            <th>Emphasis / Goal</th>
          </tr>
        </thead>
        <tbody>
          ${segs.map((seg,i)=>`
            <tr class="${seg.isTeam?'team-row':''}">
              <td class="clock">${fmtScore(times[i])}</td>
              <td><strong>${esc(seg.name)}</strong>${seg.isTeam?` <span class="team-goal-print">★ TEAM</span>`:''}</td>
              <td class="dur">${seg.duration}</td>
              <td style="font-size:10px">${esc(seg.setup)||'—'}</td>
              <td style="font-size:10px">${esc(seg.emphasis)||''}${seg.isTeam&&seg.teamGoal?`<br><strong style="color:var(--orange)">Goal: ${esc(seg.teamGoal)}</strong>`:''}</td>
            </tr>`).join('')}
        </tbody>
      </table>

      ${(p.groupings||[]).some(ging=>ging.groups.some(g=>(g.playerIds||[]).length>0))?`
        <div class="print-section-hdr">Groupings</div>
        ${(p.groupings||[]).map(ging=>`
          <div style="margin-bottom:10px">
            <div style="font-weight:bold;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--navy);margin-bottom:4px">${esc(ging.name)}</div>
            <div class="print-groups">
              ${ging.groups.filter(g=>(g.playerIds||[]).length>0).map(g=>`
                <div class="print-group">
                  <div class="print-group-name">${esc(g.name)}</div>
                  <div class="print-group-players">${(g.playerIds||[]).map(pid=>{
                    const pl=roster.find(r=>r.id===pid);
                    return pl?`#${pl.number} ${pl.name}`:'';
                  }).filter(Boolean).join(', ')}</div>
                </div>`).join('')}
            </div>
          </div>`).join('')}`:''}

      <div style="page-break-before:always;break-before:page;padding-top:12px">
        <div style="background:var(--navy);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);margin-bottom:12px;border-radius:4px">
          <span style="color:#fff;font-weight:bold;font-size:13px">Boys&#39; Basketball — Roster &amp; Groups</span>
          <span style="color:var(--gold);font-size:11px">${p.date?fmtDate(p.date):''}${p.location?' · '+esc(p.location):''}</span>
        </div>
      </div>
      ${(p.partners||[]).length>0?`
        <div class="print-section-hdr">Partners</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
          ${(p.partners||[]).map(pair=>{
            const pls=pair.playerIds.map(pid=>roster.find(r=>r.id===pid)).filter(Boolean);
            return`<div style="border:1px solid #ddd;border-radius:3px;padding:4px 10px;font-size:10px;background:#fff">${pls.map(pl=>`#${pl.number} ${pl.name}`).join(' + ')}</div>`;
          }).join('')}
        </div>`:''}
      ${(p.groups||[]).length>0?`
        <div class="print-section-hdr">Groups</div>
        <div class="print-groups" style="margin-bottom:12px">
          ${(p.groups||[]).map(g=>`
            <div class="print-group">
              <div class="print-group-name">${esc(g.name)}</div>
              <div class="print-group-players">${(g.playerIds||[]).map(pid=>{const pl=roster.find(r=>r.id===pid);return pl?`#${pl.number} ${pl.name}`:''}).filter(Boolean).join(', ')||'—'}</div>
            </div>`).join('')}
        </div>`:''}
      ${((p.teams?.navy||[]).length>0||(p.teams?.white||[]).length>0||(p.teams?.gold||[]).length>0)?`
        <div class="print-section-hdr">Teams</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
          <div style="border:1.5px solid #0A1E3C;border-radius:4px;overflow:hidden">
            <div style="background:#0A1E3C;padding:5px 10px"><span style="color:#fff;font-weight:bold;font-size:11px">🟦 Blue Team</span></div>
            <div style="padding:6px 10px;font-size:10px">${(p.teams?.navy||[]).map(pid=>{const pl=roster.find(r=>r.id===pid);return pl?`#${pl.number} ${pl.name}`:''}).filter(Boolean).join(' · ')||'—'}</div>
          </div>
          <div style="border:1.5px solid #64748B;border-radius:4px;overflow:hidden">
            <div style="background:#64748B;padding:5px 10px"><span style="color:#fff;font-weight:bold;font-size:11px">⚪ White Team</span></div>
            <div style="padding:6px 10px;font-size:10px">${(p.teams?.white||[]).map(pid=>{const pl=roster.find(r=>r.id===pid);return pl?`#${pl.number} ${pl.name}`:''}).filter(Boolean).join(' · ')||'—'}</div>
          </div>
          <div style="border:1.5px solid #C9A84C;border-radius:4px;overflow:hidden">
            <div style="background:#C9A84C;padding:5px 10px"><span style="color:#0A1E3C;font-weight:bold;font-size:11px">🟡 Gold Team</span></div>
            <div style="padding:6px 10px;font-size:10px">${(p.teams?.gold||[]).map(pid=>{const pl=roster.find(r=>r.id===pid);return pl?`#${pl.number} ${pl.name}`:''}).filter(Boolean).join(' · ')||'—'}</div>
          </div>
        </div>`:''}
      ${roster.length>0?`
        <div class="print-section-hdr">Attendance &amp; Shooting Stats</div>
        <table class="stats-table">
          <thead>
            <tr>
              <th class="left" style="width:26px">#</th>
              <th class="left">Player</th>
              <th>Att</th>
              <th>FT M</th><th>FT A</th><th>FT %</th>
              <th>3P M</th><th>3P A</th><th>3P %</th>
            </tr>
          </thead>
          <tbody>
            ${roster.map(pl=>{
              const status=getAtt(pl.id);
              const absent=status==='absent';
              const ftm=getStat(pl.id,'ft','makes'),fta=getStat(pl.id,'ft','attempts');
              const tpm=getStat(pl.id,'tp','makes'),tpa=getStat(pl.id,'tp','attempts');
              return`<tr>
                <td class="left">${pl.number}</td>
                <td class="left">${esc(pl.name)}${status==='limited'?' <em style="font-size:9px;color:#ca8a04">(Ltd)</em>':''}</td>
                <td>${absent?'✗':'✓'}</td>
                <td>${absent?'—':ftm}</td><td>${absent?'—':fta}</td><td>${absent?'—':pct(ftm,fta)}</td>
                <td>${absent?'—':tpm}</td><td>${absent?'—':tpa}</td><td>${absent?'—':pct(tpm,tpa)}</td>
              </tr>`;
            }).join('')}
            <tr class="total-row">
              <td colspan="3" class="left">Team Total</td>
              <td>${teamFTM}</td><td>${teamFTA}</td><td>${pct(teamFTM,teamFTA)}</td>
              <td>${teamTPM}</td><td>${teamTPA}</td><td>${pct(teamTPM,teamTPA)}</td>
            </tr>
          </tbody>
        </table>`:''}
    </div>
    <div class="print-footer">
      <span class="print-footer-text">Bishop Dwenger Boys' Basketball · Practice Plan · Ben Smith · Head Coach</span>
    </div>
  </div>`;
}

// ── ATTACH HANDLERS ───────────────────────────────────────────────────────────
function attachHandlers(){
  // Builder toolbar inputs
  const dateInp=document.getElementById('date-inp');
  const locInp=document.getElementById('loc-inp');
  const totalInp=document.getElementById('total-inp');
  if(dateInp) dateInp.addEventListener('input',e=>{S.plan.date=e.target.value;});
  const timeInp=document.getElementById('time-inp');
  if(timeInp) timeInp.addEventListener('input',e=>{S.plan.startTime=e.target.value;});
  if(locInp)  locInp.addEventListener('input',e=>{S.plan.location=e.target.value;});
  if(totalInp)totalInp.addEventListener('input',e=>{S.plan.totalMinutes=parseInt(e.target.value)||0;});

  // Roster form inputs
  const rn=document.getElementById('r-num');
  const rname=document.getElementById('r-name');
  const rtype=document.getElementById('r-type');
  if(rn)    rn.addEventListener('input',e=>{S.rNum=e.target.value.replace(/\D/,'');});
  if(rname){rname.addEventListener('input',e=>{S.rName=e.target.value;});
            rname.addEventListener('keydown',e=>{if(e.key==='Enter')doAddPlayer();});}
  if(rtype) rtype.addEventListener('change',e=>{S.rType=e.target.value;});

  // Segment modal inputs
  const sname=document.getElementById('seg-name');
  const sdur=document.getElementById('seg-dur');
  const ssetup=document.getElementById('seg-setup');
  const semp=document.getElementById('seg-emphasis');
  const sgoal=document.getElementById('seg-goal');
  const libCat=document.getElementById('lib-cat-filter');
  if(sname)  sname.addEventListener('input',e=>{S.segForm.name=e.target.value;});
  if(sdur)   sdur.addEventListener('input',e=>{S.segForm.duration=e.target.value;});
  if(ssetup) ssetup.addEventListener('input',e=>{S.segForm.setup=e.target.value;});
  if(semp)   semp.addEventListener('input',e=>{S.segForm.emphasis=e.target.value;});
  if(sgoal)  sgoal.addEventListener('input',e=>{S.segForm.teamGoal=e.target.value;});
  if(libCat) libCat.addEventListener('change',e=>{setState({segForm:{...S.segForm,libCat:e.target.value}});});

  // Drill library modal inputs
  const dname=document.getElementById('drill-name');
  const dcat=document.getElementById('drill-cat');
  const ddur=document.getElementById('drill-dur');
  const dsetup=document.getElementById('drill-setup');
  const demp=document.getElementById('drill-emphasis');
  if(dname)  dname.addEventListener('input',e=>{S.drillForm.name=e.target.value;});
  if(dcat)   dcat.addEventListener('change',e=>{S.drillForm.category=e.target.value;});
  if(ddur)   ddur.addEventListener('input',e=>{S.drillForm.defaultDuration=e.target.value;});
  if(dsetup) dsetup.addEventListener('input',e=>{S.drillForm.defaultSetup=e.target.value;});
  if(demp)   demp.addEventListener('input',e=>{S.drillForm.defaultEmphasis=e.target.value;});

  // Pair selects (specific IDs, safe to keep here)
  const pp1=document.getElementById('pair-p1');
  const pp2=document.getElementById('pair-p2');
  if(pp1) pp1.addEventListener('change',e=>{setState({pairForm:{...S.pairForm,p1:e.target.value}});});
  if(pp2) pp2.addEventListener('change',e=>{setState({pairForm:{...S.pairForm,p2:e.target.value}});});

  // Import file
  const impFile=document.getElementById('import-file');
  if(impFile) impFile.addEventListener('change',e=>{if(e.target.files[0])doImport(e.target.files[0]);});
}

// ── CLICK HANDLER ─────────────────────────────────────────────────────────────
function handleClick(e){
  if(e.target.id==='seg-overlay') {setState({showSegModal:false}); return;}
  if(e.target.id==='lib-overlay') {setState({showLibModal:false}); return;}
  if(e.target.id==='roster-panel'){setState({showRoster:false}); return;}

  const el=e.target.closest('[data-a]');
  if(!el)return;
  const a=el.dataset.a;

  // Navigation
  if(a==='go-home')    setState({view:'home',plan:null});
  else if(a==='home-tab')   setState({homeTab:el.dataset.tab});
  else if(a==='go-library') setState({view:'library'});
  else if(a==='go-library-from-modal') {setState({showSegModal:false,view:'library'});}
  else if(a==='go-builder') setState({view:'builder'});
  else if(a==='go-print')   setState({view:'print'});
  else if(a==='tab')        setState({builderTab:el.dataset.tab});
  else if(a==='new-plan')   setState({plan:mkPlan(),view:'builder',builderTab:'plan',expandedSegs:{},savedMsg:false});
  else if(a==='edit-plan'){
    const p=S.plans.find(x=>x.id===el.dataset.id);
    setState({plan:{...p},view:'builder',builderTab:'plan',expandedSegs:{},savedMsg:false});
  }
  else if(a==='print-plan'){const p=S.plans.find(x=>x.id===el.dataset.id);setState({plan:{...p},view:'print'});}
  else if(a==='dup-plan'){
    const src=S.plans.find(x=>x.id===el.dataset.id);
    if(src){const copy={...JSON.parse(JSON.stringify(src)),id:uid(),
      createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
      location:(src.location?src.location+' (copy)':'Copy'),
      attendance:{},shootingStats:{}};
      setState({plans:[copy,...S.plans]});showToast('Plan duplicated — edit date and location');}
  }
  else if(a==='ask-del')     setState({confirmDel:el.dataset.id});
  else if(a==='cancel-del')  setState({confirmDel:null});
  else if(a==='confirm-del'){
    setState({plans:S.plans.filter(p=>p.id!==el.dataset.id),confirmDel:null});
  }

  // Roster panel
  else if(a==='open-roster') setState({showRoster:true,rNum:'',rName:'',rType:'varsity',rErr:''});
  else if(a==='close-roster')setState({showRoster:false});
  else if(a==='save-roster') {persist(SK.roster,S.roster);setState({showRoster:false});}
  else if(a==='add-player')  doAddPlayer();
  else if(a==='del-player')  setState({roster:S.roster.filter(r=>r.id!==el.dataset.rid)});

  // Plan save
  else if(a==='save-plan') doSavePlan();

  // Segments
  else if(a==='toggle-seg'){
    const sid=el.dataset.sid;
    setState({expandedSegs:{...S.expandedSegs,[sid]:S.expandedSegs[sid]===false?true:!(S.expandedSegs[sid]!==false)}});
  }
  else if(a==='open-add-seg'){
    setState({showSegModal:true,editSegId:null,
      segForm:{type:'library',drillId:null,name:'',duration:'10',setup:'',emphasis:'',isTeam:false,teamGoal:'',libCat:'All'}});
  }
  else if(a==='open-add-seg-custom'){
    setState({showSegModal:true,editSegId:null,
      segForm:{type:'custom',drillId:null,name:'',duration:'10',setup:'',emphasis:'',isTeam:false,teamGoal:''}});
  }
  else if(a==='edit-seg'){
    const seg=S.plan.segments.find(s=>s.id===el.dataset.sid);
    if(seg) setState({showSegModal:true,editSegId:seg.id,
      segForm:{type:seg.type||'custom',drillId:seg.drillId||null,name:seg.name,duration:String(seg.duration),
               setup:seg.setup,emphasis:seg.emphasis,isTeam:seg.isTeam,teamGoal:seg.teamGoal||'',libCat:'All'}});
  }
  else if(a==='del-seg'){
    setState({plan:{...S.plan,segments:S.plan.segments.filter(s=>s.id!==el.dataset.sid)}});
  }
  else if(a==='move-up'){
    const idx=parseInt(el.dataset.idx);
    const segs=[...S.plan.segments];
    [segs[idx-1],segs[idx]]=[segs[idx],segs[idx-1]];
    setState({plan:{...S.plan,segments:segs}});
  }
  else if(a==='move-down'){
    const idx=parseInt(el.dataset.idx);
    const segs=[...S.plan.segments];
    [segs[idx],segs[idx+1]]=[segs[idx+1],segs[idx]];
    setState({plan:{...S.plan,segments:segs}});
  }
  else if(a==='save-seg')  doSaveSegment();
  else if(a==='close-seg-modal') setState({showSegModal:false});
  else if(a==='seg-type')  setState({segForm:{...S.segForm,type:el.dataset.t,drillId:null}});
  else if(a==='seg-team')  setState({segForm:{...S.segForm,isTeam:el.dataset.v==='true'}});
  else if(a==='pick-drill'){
    const d=S.library.find(x=>x.id===el.dataset.did);
    if(d) setState({segForm:{...S.segForm,drillId:d.id,name:d.name,
      duration:String(d.defaultDuration),setup:d.defaultSetup,emphasis:d.defaultEmphasis,isTeam:d.isTeamDrill}});
  }

  // Library
  else if(a==='lib-filter')  setState({libFilter:el.dataset.cat});
  else if(a==='open-add-drill'){
    setState({showLibModal:true,editDrillId:null,
      drillForm:{name:'',category:'Warmup',defaultDuration:'10',defaultSetup:'',defaultEmphasis:'',isTeamDrill:false}});
  }
  else if(a==='edit-drill'){
    const d=S.library.find(x=>x.id===el.dataset.did);
    if(d) setState({showLibModal:true,editDrillId:d.id,
      drillForm:{name:d.name,category:d.category,defaultDuration:String(d.defaultDuration),
                 defaultSetup:d.defaultSetup,defaultEmphasis:d.defaultEmphasis,isTeamDrill:d.isTeamDrill}});
  }
  else if(a==='del-drill'){
    setState({library:S.library.filter(d=>d.id!==el.dataset.did)});
  }
  else if(a==='save-drill')  doSaveDrill();
  else if(a==='close-lib-modal') setState({showLibModal:false});
  else if(a==='drill-team')  setState({drillForm:{...S.drillForm,isTeamDrill:el.dataset.v==='true'}});

  // Teams
  else if(a==='remove-from-team'){
    const {pid,team}=el.dataset;
    const teams={...S.plan.teams||{blue:[],white:[]}};
    teams[team]=(teams[team]||[]).filter(x=>x!==pid);
    setState({plan:{...S.plan,teams}});
  }
  // Attendance
  else if(a==='cycle-att'){
    const pid=el.dataset.pid;
    const cur=(S.plan.attendance||{})[pid]||'present';
    const next=cur==='present'?'limited':cur==='limited'?'absent':'present';
    setState({plan:{...S.plan,attendance:{...S.plan.attendance,[pid]:next}}});
  }

  // Groups
  else if(a==='show-add-pair') setState({showAddPair:true,pairForm:{p1:'',p2:''}});
  else if(a==='cancel-add-pair') setState({showAddPair:false,pairForm:{p1:'',p2:''}});
  else if(a==='add-pair'){
    const {p1,p2}=S.pairForm;
    if(!p1||!p2||p1===p2){alert('Select two different players.');return;}
    const partners=[...(S.plan.partners||[]),{id:uid(),playerIds:[p1,p2]}];
    setState({plan:{...S.plan,partners},showAddPair:false,pairForm:{p1:'',p2:''}});
  }
  else if(a==='del-pair'){
    setState({plan:{...S.plan,partners:(S.plan.partners||[]).filter(p=>p.id!==el.dataset.pairid)}});
  }
  else if(a==='add-group'){
    const groups=[...(S.plan.groups||[]),{id:uid(),name:'Group '+(((S.plan.groups||[]).length)+1),playerIds:[]}];
    setState({plan:{...S.plan,groups}});
  }
  else if(a==='del-group'){
    setState({plan:{...S.plan,groups:(S.plan.groups||[]).filter(g=>g.id!==el.dataset.grpid)}});
  }
  else if(a==='remove-from-group'){
    const {pid,grpid}=el.dataset;
    const groups=(S.plan.groups||[]).map(g=>g.id===grpid?{...g,playerIds:(g.playerIds||[]).filter(x=>x!==pid)}:g);
    setState({plan:{...S.plan,groups}});
  }

  // Export/Import
  else if(a==='export-data') doExport();
}

// ── ACTION FUNCTIONS ──────────────────────────────────────────────────────────
function doAddPlayer(){
  const num=parseInt(S.rNum);
  const name=S.rName.trim();
  if(!S.rNum||!name){setState({rErr:'Number and name are required.'});return;}
  if(S.roster.some(p=>p.number===num)){setState({rErr:`#${num} is already in use.`});return;}
  setState({roster:[...S.roster,{id:uid(),number:num,name,type:S.rType}],rNum:'',rName:'',rType:'varsity',rErr:''});
}

function showToast(msg,duration=2500){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0A1E3C;color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.25);transition:opacity .3s;pointer-events:none';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity='0';},duration);
}

function doSavePlan(){
  const up={...S.plan,updatedAt:new Date().toISOString()};
  const plans=S.plans.some(x=>x.id===up.id)?S.plans.map(x=>x.id===up.id?up:x):[up,...S.plans];
  setState({plans,plan:up,savedMsg:true});
  setTimeout(()=>setState({savedMsg:false}),2200);
}

function doSaveSegment(){
  const f=S.segForm;
  const name=f.name.trim();
  if(!name){alert('Segment name is required.');return;}
  const dur=Math.max(1,parseInt(f.duration)||10);
  const seg={
    id:S.editSegId||uid(),
    type:f.type,drillId:f.drillId||null,
    name,duration:dur,
    setup:f.setup.trim(),emphasis:f.emphasis.trim(),
    isTeam:f.isTeam,teamGoal:f.teamGoal.trim(),
    category:f.type==='library'?(S.library.find(d=>d.id===f.drillId)||{}).category||'Other':'Other',
  };
  let segments;
  if(S.editSegId){segments=S.plan.segments.map(s=>s.id===S.editSegId?seg:s);}
  else{segments=[...S.plan.segments,seg];}
  setState({plan:{...S.plan,segments},showSegModal:false,expandedSegs:{...S.expandedSegs,[seg.id]:true}});
}

function doSaveDrill(){
  const f=S.drillForm;
  const name=f.name.trim();
  if(!name){alert('Drill name is required.');return;}
  const drill={
    id:S.editDrillId||uid(),
    name,category:f.category,
    defaultDuration:Math.max(1,parseInt(f.defaultDuration)||10),
    defaultSetup:f.defaultSetup.trim(),
    defaultEmphasis:f.defaultEmphasis.trim(),
    isTeamDrill:f.isTeamDrill,
  };
  const library=S.editDrillId?S.library.map(d=>d.id===S.editDrillId?drill:d):[...S.library,drill];
  setState({library,showLibModal:false});
}

function doExport(){
  const data={version:1,exportedAt:new Date().toISOString(),roster:S.roster,plans:S.plans,library:S.library};
  localStorage.setItem(BK_KEY,new Date().toISOString());
  const bkEl=document.getElementById('pp-bk-ind');if(bkEl)bkEl.innerHTML='<span style="color:#4ade80"> ✓</span>';
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='saints-practice-'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function doImport(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data.roster)||!Array.isArray(data.plans)){
        alert('Invalid file. Use a file exported from the Saints Practice Plan Builder.');return;
      }
      const msg='Import '+data.plans.length+' plan(s), '+data.roster.length+' player(s), and '+(data.library||[]).length+' drill(s)?\n\nThis replaces your current data.';
      if(confirm(msg)){setState({roster:data.roster,plans:data.plans,library:data.library||[]});}
    }catch{alert('Could not read file.');}
  };
  reader.readAsText(file);
}


// ── CHANGE EVENT DELEGATION ───────────────────────────────────────────────────
document.addEventListener('change',function(e){
  const el=e.target,a=el.dataset&&el.dataset.a;
  if(a==='assign-team'){
    const pid=el.dataset.pid,team=el.value;
    const teams={
      navy:(S.plan.teams?.navy||[]).filter(x=>x!==pid),
      white:(S.plan.teams?.white||[]).filter(x=>x!==pid),
      gold:(S.plan.teams?.gold||[]).filter(x=>x!==pid),
    };
    if(team==='navy')  teams.navy=[...teams.navy,pid];
    if(team==='white') teams.white=[...teams.white,pid];
    if(team==='gold')  teams.gold=[...teams.gold,pid];
    setState({plan:{...S.plan,teams}});return;
  }
  if(a==='assign-group'){
    const pid=el.dataset.pid,grpId=el.value;
    const groups=(S.plan.groups||[]).map(g=>({...g,playerIds:(g.playerIds||[]).filter(x=>x!==pid)}));
    if(grpId){const gi=groups.findIndex(g=>g.id===grpId);if(gi>=0)groups[gi].playerIds=[...groups[gi].playerIds,pid];}
    setState({plan:{...S.plan,groups}});return;
  }
  if(el.dataset&&el.dataset.stat){
    const [cat,field]=el.dataset.stat.split('-');
    const pid=el.dataset.pid,val=Math.max(0,parseInt(el.value)||0);
    const stats={...S.plan.shootingStats};
    if(!stats[pid])stats[pid]={ft:{makes:0,attempts:0},tp:{makes:0,attempts:0}};
    stats[pid]={...stats[pid],[cat]:{...stats[pid][cat],[field]:val}};
    S.plan.shootingStats=stats;return;
  }
});
document.addEventListener('input',function(e){
  const el=e.target;
  if(el.dataset&&el.dataset.grpid&&el.tagName==='INPUT'){
    const groups=(S.plan.groups||[]).map(g=>g.id===el.dataset.grpid?{...g,name:el.value}:g);
    S.plan.groups=groups;
  }
});
// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('click',handleClick);
(function updateBkInd(){
  const el=document.getElementById('pp-bk-ind');
  if(!el)return;
  const l=localStorage.getItem(BK_KEY);
  const age=l?(Date.now()-new Date(l).getTime()):Infinity;
  const d=Math.floor(age/86400000);
  el.innerHTML=d>7?'<span style="color:#f87171;font-weight:bold"> ⚠ '+d+'d</span>':
               d>1?'<span style="color:#fbbf24"> '+d+'d</span>':
               l?'<span style="color:#4ade80"> ✓</span>':'';
})();
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();doExport();}
});
window.addEventListener('beforeunload',e=>{
  const last=localStorage.getItem(BK_KEY);
  const age=last?(Date.now()-new Date(last).getTime()):Infinity;
  if(age>24*60*60*1000){e.preventDefault();e.returnValue='You have unsaved changes. Download a backup before leaving?';}
});
render();


function buildPracticePlanDoc(plan, roster) {
  const NAVY='#0A1E3C', GOLD='#C9A84C', LGOLD='#FEFCE8', LGRAY='#F8F8F8', WHITE='#ffffff';
  const RULE='#E0E0E0', GRULE='#BBBBBB';
  const PW=612, PH=792, M=28, CW=PW-2*M;
  const segs = plan.segments || [];
  const n = segs.length;

  function fmtClock(total,el){const r=Math.max(0,total-el);return String(Math.floor(r)).padStart(2,'0')+':00';}
  function pct(m,a){return a>0?Math.round(m/a*100)+'%':'—';}
  function plName(pid){const p=roster.find(r=>r.id===pid);return p?`#${p.number} ${p.name}`:'';}
  function secHdr(lbl){return{
    table:{widths:['*'],body:[[{
      text:lbl.toUpperCase(),fontSize:8,bold:true,color:NAVY,
      characterSpacing:0.6,fillColor:LGOLD,margin:[6,5,6,5]
    }]]},
    layout:{
      hLineWidth:(i)=>i===0?0.3:i===1?1.5:0.3,
      hLineColor:(i)=>i===1?GOLD:RULE,
      vLineWidth:()=>0
    },
    margin:[0,8,0,4]
  };}

  // ── PAGE 1 ────────────────────────────────────────────────────────────────
  const HDR_H=62, GOLD_H=3, PAD_CELL=3, TH_H=20, FTR_H=18;
  // Available for table body (heights array = content height, padding is additional)
  const tableTotal = PH - 2*M - HDR_H - GOLD_H - 8 - 32 - 4;  // 32 = bottom margin for doc-level footer
  const cellPad = PAD_CELL * 2;  // top + bottom padding per cell
  const thTotal = TH_H + cellPad;
  const rowTotal = Math.max(18, Math.floor((tableTotal - thTotal) / n));
  const rowH = rowTotal - cellPad;  // content height for heights[] array

  let elapsed = 0;
  const rows = segs.map((seg, i) => {
    const clock = fmtClock(parseInt(plan.totalMinutes)||0, elapsed);
    elapsed += parseInt(seg.duration)||0;
    const fill = seg.isTeam ? LGOLD : (i%2===0 ? WHITE : LGRAY);
    const nameStack = [{text:seg.name+(seg.isTeam?'  ★ TEAM':''), bold:true, fontSize:9, lineHeight:1.15}];
    if(seg.teamGoal) nameStack.push({text:'Goal: '+seg.teamGoal, italics:true, fontSize:7.5, color:'#555', lineHeight:1.1, margin:[0,1,0,0]});
    return [
      {text:clock, fontSize:13, bold:true, alignment:'center', color:NAVY, fillColor:fill, lineHeight:1},
      {stack:nameStack, fillColor:fill},
      {text:String(seg.duration||''), fontSize:10, bold:true, alignment:'center', fillColor:fill, lineHeight:1},
      {text:seg.setup||'', fontSize:8, fillColor:fill, lineHeight:1.15},
      {text:seg.emphasis||'', fontSize:8, fillColor:fill, lineHeight:1.15},
    ];
  });

  const page1 = [
    // Navy header
    {table:{widths:['*','auto'],body:[[
      {stack:[
        {text:'BISHOP DWENGER HIGH SCHOOL  ·  FORT WAYNE, INDIANA', fontSize:6.5, color:GOLD, bold:true, characterSpacing:0.5, margin:[0,0,0,3]},
        {text:"Boys' Basketball — Practice Plan", fontSize:14, bold:true, color:WHITE}
      ],fillColor:NAVY},
      {stack:[
        {text:fmtDate(plan.date)+(plan.location?' · '+plan.location:''), fontSize:10, bold:true, color:GOLD, alignment:'right'},
        {text:(plan.startTime?'Start: '+plan.startTime+'  ·  ':'')+
          'Total: '+(parseInt(plan.totalMinutes)||0)+' min  ·  Ben Smith · Head Coach',
          fontSize:7.5, color:WHITE, alignment:'right', margin:[0,3,0,0]}
      ],fillColor:NAVY}
    ]]},layout:{hLineWidth:()=>0,vLineWidth:()=>0,paddingLeft:()=>8,paddingRight:()=>8,paddingTop:()=>10,paddingBottom:()=>10}},
    // Gold bar
    {canvas:[{type:'rect',x:0,y:0,w:CW,h:GOLD_H,color:GOLD}], margin:[0,0,0,8]},
    // Practice plan table
    {table:{
      headerRows:1,
      widths:[44,'*',18,125,'*'],
      heights:[TH_H, ...Array(n).fill(rowH)],
      body:[
        [{text:'CLOCK',bold:true,fontSize:7.5,color:NAVY,alignment:'center',fillColor:LGRAY},
         {text:'SEGMENT',bold:true,fontSize:7.5,color:NAVY,fillColor:LGRAY},
         {text:'MIN',bold:true,fontSize:7.5,color:WHITE,alignment:'center',fillColor:NAVY},
         {text:'SETUP / EQUIPMENT',bold:true,fontSize:7.5,color:NAVY,fillColor:LGRAY},
         {text:'EMPHASIS / GOAL',bold:true,fontSize:7.5,color:NAVY,fillColor:LGRAY}],
        ...rows
      ]
    },layout:{
      // i=0: top of table; i=1: below header; i=n: bottom of table
      hLineWidth:(i,node)=>{
        const n=node.table.body.length;
        if(i===0||i===n) return 0.3;        // thin outer border
        if(i===1)        return 0.75;        // bold line below column headers
        return 0.3;                           // thin gridline between rows
      },
      hLineColor:(i,node)=>{
        const n=node.table.body.length;
        if(i===0||i===n) return RULE;
        if(i===1) return GRULE;
        return RULE;
      },
      // Thin vertical separators between every column
      vLineWidth:(i,node)=>{
        const nc=node.table.widths.length;
        if(i===0||i===nc) return 0;          // no outer left/right border
        return 0.4;                           // separator between columns
      },
      vLineColor:()=>RULE,
      paddingLeft:()=>5, paddingRight:()=>5,
      paddingTop:()=>PAD_CELL, paddingBottom:()=>PAD_CELL,
    }},
    // Footer handled at doc level
  ];

  // ── PAGE 2 ────────────────────────────────────────────────────────────────
  const att=plan.attendance||{}, stats=plan.shootingStats||{}, teams=plan.teams||{};
  const sorted=[...roster].sort((a,b)=>a.number-b.number);
  const present=sorted.filter(r=>(att[r.id]||'present')!=='absent');
  function getStat(pid,c,f){return(stats[pid]&&stats[pid][c]?stats[pid][c][f]:0)||0;}
  let ftm=0,fta=0,tpm=0,tpa=0;
  present.forEach(pl=>{ftm+=getStat(pl.id,'ft','makes');fta+=getStat(pl.id,'ft','attempts');tpm+=getStat(pl.id,'tp','makes');tpa+=getStat(pl.id,'tp','attempts');});

  const partners = plan.partners||[], groups = plan.groups||[];

  // Partners
  let partnerRows=[];
  for(let i=0;i<partners.length;i+=3){
    const row=[];
    for(let j=0;j<3;j++){
      const p=partners[i+j];
      if(p){const pls=(p.playerIds||[]).map(pid=>roster.find(r=>r.id===pid)).filter(Boolean);
        row.push({text:pls.length>=2?`#${pls[0].number} ${pls[0].name}  +  #${pls[1].number} ${pls[1].name}`:'',fontSize:8.5,border:[true,true,true,true],borderColor:['#ddd','#ddd','#ddd','#ddd'],margin:[5,3,5,3]});}
      else row.push({text:'',border:[false,false,false,false]});
    }
    partnerRows.push(row);
  }
  const partnerSection = partners.length ? [
    secHdr('Partners'),
    {table:{widths:['*','*','*'],body:partnerRows},layout:{hLineWidth:()=>0.3,vLineWidth:(i)=>i>0&&i<3?0.3:0,hLineColor:()=>'#ddd',vLineColor:()=>'#ddd',paddingLeft:()=>0,paddingRight:()=>0,paddingTop:()=>0,paddingBottom:()=>0},margin:[0,0,0,8]}
  ] : [];

  // Groups
  let groupRows=[];
  for(let i=0;i<groups.length;i+=2){
    const row=[];
    for(let j=0;j<2;j++){
      const g=groups[i+j];
      if(g){row.push({stack:[{text:g.name||'',bold:true,fontSize:8.5,margin:[0,0,0,2]},{text:(g.playerIds||[]).map(pid=>plName(pid)).filter(Boolean).join(', '),fontSize:8.5}],border:[true,true,true,true],borderColor:['#ddd','#ddd','#ddd','#ddd'],margin:[6,5,6,5]});}
      else row.push({text:'',border:[false,false,false,false]});
    }
    groupRows.push(row);
  }
  const groupSection = groups.length ? [
    secHdr('Groups'),
    {table:{widths:['*','*'],body:groupRows},layout:{hLineWidth:()=>0.3,vLineWidth:(i)=>i===1?0.3:0,hLineColor:()=>'#ddd',vLineColor:()=>'#ddd',paddingLeft:()=>0,paddingRight:()=>0,paddingTop:()=>0,paddingBottom:()=>0},margin:[0,0,0,8]}
  ] : [];

  // Teams
  function teamBox(lbl,emoji,bg,bc,pids){
    const players=(pids||[]).map(pid=>plName(pid)).filter(Boolean).join('  ·  ')||'—';
    return{
      table:{widths:['*'],body:[
        [{text:emoji+' '+lbl, bold:true, fontSize:9.5, color:WHITE, fillColor:bc,
          border:[true,true,true,false], borderColor:[bc,bc,bc,'']}],
        [{text:players, fontSize:8.5, color:'#222', fillColor:bg,
          border:[true,false,true,true], borderColor:[bc,'',bc,bc]}]
      ]},
      layout:{hLineWidth:()=>0,vLineWidth:()=>0,
        paddingLeft:()=>8,paddingRight:()=>8,paddingTop:()=>6,paddingBottom:()=>6}
    };
  }
  const teamsSection=[
    secHdr('Teams'),
    {table:{widths:['*','*','*'],body:[[
      teamBox('Blue Team','🟦','#EEF2F8','#1D4E89',teams.navy||[]),
      teamBox('White Team','⚪','#F0F0F0','#555555',teams.white||[]),
      teamBox('Gold Team','🟡',LGOLD,'#A07A20',teams.gold||[]),
    ]]},layout:{hLineWidth:()=>0,vLineWidth:()=>0,paddingLeft:()=>3,paddingRight:()=>3,paddingTop:()=>0,paddingBottom:()=>0},margin:[0,0,0,8]}
  ];

  // Stats
  const statsRows=present.map((pl,i)=>{
    const a=(att[pl.id]||'present')==='present'?'✓':(att[pl.id]==='limited'?'~':'✗');
    const m=getStat(pl.id,'ft','makes'),at=getStat(pl.id,'ft','attempts');
    const m3=getStat(pl.id,'tp','makes'),at3=getStat(pl.id,'tp','attempts');
    const f=i%2===0?null:LGRAY;
    const cell=(t,align='left')=>({text:String(t),fontSize:8,alignment:align,fillColor:f});
    return[cell(pl.number,'center'),cell(pl.name),cell(a,'center'),cell(m,'center'),cell(at,'center'),cell(pct(m,at),'center'),cell(m3,'center'),cell(at3,'center'),cell(pct(m3,at3),'center')];
  });
  statsRows.push([
    {text:'',colSpan:2,border:[false,true,false,false],borderColor:['','#ccc','','']},{},
    {text:'',border:[false,false,false,false]},
    ...[ftm,fta,pct(ftm,fta),tpm,tpa,pct(tpm,tpa)].map(v=>({text:String(v),bold:true,fontSize:8,alignment:'center'}))
  ]);

  const page2 = [
    {table:{widths:['*','auto'],body:[[
      {text:"Boys' Basketball — Roster & Groups",bold:true,fontSize:11,color:WHITE,fillColor:NAVY},
      {text:fmtDate(plan.date)+(plan.location?' · '+plan.location:''),bold:true,fontSize:8.5,color:GOLD,alignment:'right',fillColor:NAVY}
    ]]},layout:{hLineWidth:()=>0,vLineWidth:()=>0,paddingLeft:()=>8,paddingRight:()=>8,paddingTop:()=>9,paddingBottom:()=>9},margin:[0,0,0,3]},
    {canvas:[{type:'rect',x:0,y:0,w:CW,h:2.5,color:GOLD}],margin:[0,0,0,8]},
    ...partnerSection, ...groupSection, ...teamsSection,
    secHdr('Attendance & Shooting Stats'),
    {table:{headerRows:1,widths:[18,'*',18,22,22,22,22,22,22],body:[
      [{text:'#',bold:true,fontSize:7,color:NAVY,alignment:'center',fillColor:LGRAY},
       {text:'PLAYER',bold:true,fontSize:7,color:NAVY,fillColor:LGRAY},
       {text:'ATT',bold:true,fontSize:7,color:NAVY,alignment:'center',fillColor:LGRAY},
       {text:'FT M',bold:true,fontSize:7,color:NAVY,alignment:'center',fillColor:LGRAY},
       {text:'FT A',bold:true,fontSize:7,color:NAVY,alignment:'center',fillColor:LGRAY},
       {text:'FT %',bold:true,fontSize:7,color:NAVY,alignment:'center',fillColor:LGRAY},
       {text:'3P M',bold:true,fontSize:7,color:NAVY,alignment:'center',fillColor:LGRAY},
       {text:'3P A',bold:true,fontSize:7,color:NAVY,alignment:'center',fillColor:LGRAY},
       {text:'3P %',bold:true,fontSize:7,color:NAVY,alignment:'center',fillColor:LGRAY}],
      ...statsRows
    ]},layout:{
        hLineWidth:(i,node)=>{const n=node.table.body.length;return i===0||i===n?0.3:i===1?0.75:0.3;},
        hLineColor:(i,node)=>{const n=node.table.body.length;return i===0||i===n?RULE:i===1?GRULE:RULE;},
        vLineWidth:(i,node)=>{const nc=node.table.widths.length;return i===0||i===nc?0:0.3;},
        vLineColor:()=>RULE,
        paddingLeft:()=>4,paddingRight:()=>4,paddingTop:()=>3,paddingBottom:()=>3
      }},
    // Footer handled at doc level
  ];

  return {
    pageSize:'LETTER', pageMargins:[M,M,M,32],
    defaultStyle:{font:'Roboto',lineHeight:1.1},
    footer:()=>({
      margin:[0,6,0,0],
      stack:[
        {canvas:[{type:'line',x1:M,y1:0,x2:584,y2:0,lineWidth:0.5,lineColor:'#CCCCCC'}]},
        {text:"Bishop Dwenger Boys' Basketball  ·  Practice Plan  ·  Ben Smith  ·  Head Coach",
         fontSize:7,color:'#AAAAAA',alignment:'center',margin:[0,5,0,0]}
      ]
    }),
    content:[...page1,{text:'',pageBreak:'before'},...page2]
  };
}

function downloadPDF() {
  if (!window.pdfMake || !window.pdfMake.vfs) {
    alert('PDF library still loading, please try again in a moment.');
    return;
  }
  showToast('Generating PDF…');
  setTimeout(()=>{try {
    const docDef = buildPracticePlanDoc(S.plan, S.roster);
    const date = S.plan.date || new Date().toISOString().slice(0,10);
    const loc = (S.plan.location||'').replace(/[^a-z0-9]/gi,'_')||'plan';
    pdfMake.createPdf(docDef).download('practice-plan-' + date + '-' + loc + '.pdf');
    showToast('PDF downloaded ✓');
  } catch(e) {
    console.error('PDF error:', e);
    alert('PDF generation error: ' + e.message);
  }
  },50);
}
