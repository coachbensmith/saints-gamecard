<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<title>Saints — Game Card Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0A1E3C;--gold:#C9A84C;--gold-l:#FEFCE8;
  --green:#1A5C3A;--green-l:#EBF7F0;
  --blue:#1D4E89;--blue-l:#EBF2FB;
  --purple:#5B2D8E;--purp-l:#F3EEFF;
  --lgray:#F4F4F4;--mgray:#999;--dgray:#333;
}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#E0E0E0;min-height:100vh;font-size:14px;color:var(--dgray);}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
.topbar{background:var(--navy);border-bottom:4px solid var(--gold);padding:13px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
.topbar-title{color:#fff;font-weight:bold;font-size:17px;flex:1;}
.topbar-eyebrow{color:var(--gold);font-size:8px;letter-spacing:3px;text-transform:uppercase;display:block;margin-bottom:2px;}
.btn{border:none;border-radius:4px;padding:7px 16px;font-size:13px;font-weight:bold;cursor:pointer;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--gold);color:var(--gold);}
.btn-ghost-sm{background:transparent;border:1px solid #ccc;color:#555;padding:4px 10px;font-size:12px;font-weight:normal;}
.btn-navy-sm{background:var(--navy);color:#fff;padding:4px 10px;font-size:12px;}
.btn-danger-sm{background:#dc2626;color:#fff;padding:4px 10px;font-size:12px;}
.btn-sm{padding:5px 12px;font-size:12px;}
.inp{border:1px solid #ddd;border-radius:4px;padding:6px 10px;font-size:13px;outline:none;background:#fff;}
.inp-dark{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:4px;padding:5px 10px;font-size:13px;outline:none;}
.inp-dark::placeholder{color:rgba(255,255,255,.45);}
.content{max-width:860px;margin:26px auto;padding:0 18px;}
.section-label{color:var(--navy);font-weight:bold;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.plan-card{background:#fff;border:1px solid #ddd;border-left:4px solid var(--gold);border-radius:5px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:8px;}
.plan-card-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.plan-name{font-weight:bold;font-size:16px;color:var(--navy);}
.plan-meta{color:var(--mgray);font-size:11px;margin-top:3px;}
.empty-state{text-align:center;padding:64px 0;color:#888;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.empty-title{font-size:18px;font-weight:bold;color:var(--navy);margin-bottom:6px;}
.section-block{margin-bottom:14px;border-radius:5px;overflow:hidden;border:1px solid #d5d5d5;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.sec-hdr{padding:7px 13px;display:flex;align-items:center;gap:6px;border-left:none;border-bottom-width:2.5px;border-bottom-style:solid;background:#fff;}
.grp-row{padding:6px 12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #ddd;cursor:pointer;user-select:none;}
.grp-code{font-weight:bold;font-size:10px;min-width:48px;}
.grp-name{font-weight:bold;font-size:13px;color:var(--navy);flex:1;}
.grp-toggle{font-size:10px;color:#777;padding:2px 7px;border:1px solid #ccc;border-radius:3px;background:#fff;cursor:pointer;}
.sub-hdr{padding:4px 12px 4px 26px;display:flex;align-items:center;gap:6px;background:#f0f0f0;border-bottom:1px solid #e0e0e0;border-left-width:2.5px;border-left-style:solid;}
.play-row{border-bottom:1px solid #f0f0f0;}
.play-main{padding:5px 12px;display:flex;align-items:center;gap:8px;}
.play-main.indent{padding-left:40px;}
.play-cb{cursor:pointer;width:14px;height:14px;flex-shrink:0;}
.play-code{font-size:10px;min-width:50px;}
.play-name{font-size:13px;flex:1;}
.play-name.ctr{font-style:italic;color:var(--purple);}
.play-code.ctr{font-weight:bold;color:var(--purple);}
.play-assign{padding:4px 12px 5px;border-top:1px solid #e8f0fb;display:flex;align-items:center;flex-wrap:wrap;gap:5px;background:#f7fbff;}
.play-assign.indent{padding-left:40px;}
.assign-label{color:#aaa;font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-right:2px;}
.player-chip{background:var(--navy);color:#fff;border-radius:3px;padding:2px 7px;font-size:11px;display:inline-flex;align-items:center;gap:4px;}
.chip-x{cursor:pointer;opacity:.55;font-size:10px;line-height:1;border:none;background:none;color:#fff;padding:0;}
.add-player-btn{background:none;border:1px dashed var(--gold);color:var(--gold);border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;}
.player-select{border:1px solid var(--gold);border-radius:3px;padding:3px 7px;font-size:12px;outline:none;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:flex-end;}
.modal-panel{background:#fff;width:320px;height:100vh;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.18);display:flex;flex-direction:column;}
.modal-hdr{background:var(--navy);padding:13px 16px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-hdr-title{color:#fff;font-weight:bold;font-size:14px;}
.modal-form{padding:13px 14px;border-bottom:1px solid #eee;background:#fafafa;flex-shrink:0;}
.modal-form-title{font-weight:bold;font-size:11px;color:var(--navy);letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;}
.modal-err{color:#c00;font-size:11px;margin-top:6px;}
.roster-list{flex:1;overflow-y:auto;}
.roster-type-hdr{padding:5px 14px;font-size:9px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:var(--mgray);background:#f5f5f5;border-top:1px solid #eee;border-bottom:1px solid #eee;}
.roster-player{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid #f5f5f5;}
.roster-num{background:var(--navy);color:var(--gold);font-weight:bold;font-size:12px;border-radius:3px;padding:2px 6px;margin-right:10px;min-width:32px;text-align:center;}
.print-controls{background:var(--navy);padding:10px 18px;display:flex;gap:10px;align-items:center;border-bottom:3px solid var(--gold);}
.print-area{background:#fff;max-width:1000px;margin:20px auto;box-shadow:0 2px 16px rgba(0,0,0,.15);}
.card-hdr{background:var(--navy);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid var(--gold);}
.card-eyebrow{color:var(--gold);font-size:8px;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px;}
.card-title{color:#fff;font-size:17px;font-weight:bold;}
.card-opp{color:var(--gold);font-weight:bold;font-size:15px;}
.card-date{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px;}
.card-coach{color:rgba(255,255,255,.4);font-size:10px;margin-top:1px;}
.card-body{padding:12px 14px;display:grid;gap:10px;}
.card-col{border:1px solid #E0E0E0;border-radius:3px;overflow:hidden;font-size:12px;background:#fff;}
.card-sec-hdr{padding:6px 10px;background:#fff;border-left:none;border-top:1px solid #E0E0E0;border-bottom:2.5px solid;}
.card-sec-label{font-weight:800;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;}
.card-grp-hdr{padding:4px 8px;display:flex;gap:5px;align-items:center;border:none;border-bottom:1px solid #CCCCCC;}
.card-grp-code{font-weight:bold;font-size:8px;min-width:36px;}
.card-grp-name{color:#0D1B2A;font-weight:800;font-size:10.5px;}
.card-sub-hdr{padding:3px 8px 2px 13px;display:flex;gap:5px;background:#F8F8F8;border-top:0.5px solid #E0E0E0;border-bottom:0.5px solid #E0E0E0;}
.card-sub-code{font-weight:bold;font-size:8px;}
.card-sub-name{color:var(--navy);font-weight:bold;font-size:9px;}
.card-play{border-bottom:0.5px solid #E0E0E0;padding:3px 8px 3px 16px;}
.card-play.indent{padding-left:18px;}
.card-play-line{display:flex;gap:5px;align-items:baseline;}
.card-play-code{font-size:8px;min-width:42px;font-weight:600;border-right:0.5px solid #E0E0E0;padding-right:6px;margin-right:4px;}
.card-play-name{font-size:10px;flex:1;color:#0D1B2A;}
.card-play-name.ctr{font-style:italic;color:var(--purple);}
.card-play-code.ctr{font-weight:bold;color:var(--purple);}
.card-players{padding-left:47px;margin-top:2px;display:flex;flex-wrap:wrap;gap:3px;}

.card-chip{background:var(--navy);color:#fff;font-size:9px;font-weight:700;border-radius:2px;padding:2px 6px;}
.card-footer{border-top:1px solid var(--gold);padding:5px 14px;text-align:center;}
.card-footer-text{color:#bbb;font-size:8px;}
.card-no-plays{padding:48px;text-align:center;color:#bbb;font-size:14px;}
.warn-bar{background:#fff8e1;border:1px solid #f5d04a;border-radius:5px;padding:9px 13px;margin-bottom:14px;font-size:12px;color:#7a5900;display:flex;gap:8px;align-items:center;}
@media print{

  body{background:#fff;margin:0;width:739px!important;-webkit-text-size-adjust:none;text-size-adjust:none;}

  /* Header */

  .card-opp{font-size:12pt;}

  .card-sub-hdr{padding:2pt 7pt 1pt 10pt;background:#F8F8F8;border-top:0.4pt solid #E0E0E0;border-bottom:0.4pt solid #E0E0E0;}

  .card-play-code{font-size:8pt;min-width:28pt;}
  .card-play-name{font-size:9pt;color:#0D1B2A;}
  .card-players{padding-left:40pt;gap:3pt;margin-top:1pt;}
  .card-chip{font-size:8pt;font-weight:700;padding:1pt 4pt;}

  /* Back page (OB/Zone/Press) — fixed larger size, ~20 items per column */
  .back-page .card-grp-name{font-size:9.5pt!important;}
  .back-page .card-sub-name{font-size:9pt!important;}
  .back-page .card-play-name{font-size:9pt!important;}
  .back-page .card-grp-code{font-size:8pt!important;min-width:30pt!important;}
  .back-page .card-play-code{font-size:8pt!important;min-width:30pt!important;}
}

<script>
const DEFAULT_SYSTEM=[
  {id:'primary',label:'Primary Transition',color:'#C9A84C',bg:'#FEFCE8',groups:[
    {id:'pistol',code:'"1"',name:'Pistol',plays:[

const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const fmtDate=d=>{try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d||'';}};
const mkPlan=(opp='',date='')=>({id:uid(),opponent:opp,date,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),selections:{},familySelections:{}});
const grpIds=grp=>grp.subs?grp.subs.flatMap(s=>s.plays.map(p=>p.id)):grp.plays.map(p=>p.id);
const selCount=plan=>Object.keys(plan.selections||{}).length+Object.keys(plan.familySelections||{}).length;
const isOpen=id=>S.openGroups[id]!==false;

function setState(patch){
  const sy=window.scrollY;
  Object.assign(S,patch);
  if(patch.roster!==undefined)persist(SK.roster,S.roster);
  if(patch.plans!==undefined)persist(SK.plans,S.plans);
  render();
  window.scrollTo(0,sy);
}

function render(){
  let html='';
  if(S.view==='home')    html=renderHome();
  if(S.view==='builder') html=renderBuilder();
  if(S.view==='print')   html=renderPrint();
  if(S.showRoster)       html+=renderRosterModal();
  if(S.showPlaybook)     html+=renderPlaybookModal();
  document.getElementById('app').innerHTML=html;
  attachHandlers();

  // Apply dynamic padding to print view after DOM settles
  if(S.view==='print') requestAnimationFrame(applyPrintPadding);
}

function renderSectionBlock(sec){
  return`<div class="section-block">
    <div class="sec-hdr" style="background:${sec.bg||'#F4F4F4'};border-bottom:2.5px solid ${sec.color};border-color:${sec.color}">
      <span style="color:${sec.color};font-weight:800;font-size:10px;letter-spacing:2px;text-transform:uppercase">${esc(sec.label)}</span>
    </div>
    ${sec.groups.map(grp=>renderGroupBlock(grp,sec)).join('')}
  </div>`;
}

function renderGroupBlock(grp,sec){
  const color=grp.color||sec.color;
  const bg=grp.bg||sec.bg;
  const ids=grpIds(grp);
  const fsel=(S.plan.familySelections||{})[grp.id]===true;
  const sn=fsel?0:ids.filter(id=>S.plan.selections[id]!==undefined).length;
  const allOn=!fsel&&sn===ids.length;
  const open=isOpen(grp.id);
  return`
  <div class="grp-row" style="background:${fsel?'#FFFBEB':bg};border-color:${fsel?'#C9A84C':'#ddd'};border-left:3.5px solid ${color}" data-a="toggle-grp-open" data-gid="${grp.id}">
    <span style="color:#aaa;font-size:10px;width:10px">${open?'&#9662;':'&#9658;'}</span>
    <span class="grp-code" style="color:${color}">${esc(grp.code)}</span>
    <span class="grp-name">${esc(grp.name)}</span>
    <button class="grp-family${fsel?' active':''}" data-a="toggle-family" data-gid="${grp.id}" data-ids="${ids.join(',')}">&#9733; Family</button>
    <button class="grp-toggle" data-a="toggle-all" data-ids="${ids.join(',')}" data-allon="${allOn}" ${fsel?'disabled style="opacity:.4"':''}>${allOn?'Deselect All':'Select All'}</button>
    <span style="font-size:11px;color:var(--mgray);min-width:32px;text-align:right">${fsel?'&#9733;':sn+'/'+ids.length}</span>
  </div>
  ${open?(grp.subs
    ?grp.subs.map(sub=>renderSubBlock(sub,color,fsel)).join('')
    :grp.plays.map((play,i)=>renderPlayRow(play,color,i%2===1,false,fsel)).join('')
  ):''}`;
}

function renderSubBlock(sub,color,fsel=false){
  return`
  <div class="sub-hdr" style="border-color:${color}">
    <span style="font-weight:bold;font-size:10px;color:${color}">${esc(sub.code)}</span>
    <span style="color:var(--navy);font-weight:bold;font-size:11px">${esc(sub.name)}</span>
  </div>
  ${sub.plays.map((play,i)=>renderPlayRow(play,color,i%2===1,true,fsel)).join('')}`;
}

function renderPlayRow(play,color,alt,indent,fsel=false){
  const sel=S.plan.selections[play.id]!==undefined;
  const assigned=S.plan.selections[play.id]||[];
  const bg=play.ctr?'#f3eeff':alt?'#fafafa':'#fff';
  const available=S.roster.filter(r=>!assigned.includes(r.id)).sort((a,b)=>a.number-b.number);
  const showDrop=S.showDropFor===play.id;
  return`<div class="play-row${fsel?' play-row-dimmed':''}" style="background:${bg}">
    <div class="play-main${indent?' indent':''}">
      <input type="checkbox" class="play-cb" ${sel?'checked':''} style="accent-color:${color}" data-a="toggle-play" data-pid="${play.id}">
      <span class="play-code${play.ctr?' ctr':''}">${esc(play.code)}</span>
      <span class="play-name${play.ctr?' ctr':''}">${esc(play.name)}</span>
    </div>
    ${sel?`<div class="play-assign${indent?' indent':''}">
      <span class="assign-label">Players:</span>
      ${assigned.map(rid=>{
        const pl=S.roster.find(r=>r.id===rid);
        return pl?`<span class="player-chip">#${pl.number} ${esc(pl.name)}<button class="chip-x" data-a="remove-player" data-pid="${play.id}" data-rid="${rid}">&#10005;</button></span>`:'';
      }).join('')}
      ${!showDrop&&available.length>0?`<button class="add-player-btn" data-a="show-drop" data-pid="${play.id}">+ Player</button>`:''}
      ${showDrop?`<select class="player-select" data-a="assign-player" data-pid="${play.id}">
        <option value="">Select player...</option>
        ${available.map(r=>`<option value="${r.id}">#${r.number} ${esc(r.name)}</option>`).join('')}
      </select>`:''}
      ${S.roster.length===0?`<span style="color:#ccc;font-size:11px">No players in roster</span>`:''}
    </div>`:''}
  </div>`;
}

function renderRosterModal(){
  const sorted=[...S.roster].sort((a,b)=>a.number-b.number);
  const varsity=sorted.filter(p=>p.type==='varsity');

}

function renderPrint(){
  const p=S.plan;
  const getPlayers=pid=>(p.selections[pid]||[]).map(id=>S.roster.find(r=>r.id===id)).filter(Boolean).sort((a,b)=>a.number-b.number);

  const fselMap=p.familySelections||{};
  const activeSecs=SYSTEM.map(sec=>{
    const groups=sec.groups.map(grp=>{
      // Family-selected: include group as-is (renders as single line)
      if(fselMap[grp.id]) return grp;
      if(grp.subs){
        const subs=grp.subs.map(sub=>{const plays=sub.plays.filter(pl=>p.selections[pl.id]!==undefined);return plays.length?{...sub,plays}:null;}).filter(Boolean);
        return subs.length?{...grp,subs,plays:undefined}:null;
      }
      const plays=grp.plays.filter(pl=>p.selections[pl.id]!==undefined);
      return plays.length?{...grp,plays}:null;
    }).filter(Boolean);
    return groups.length?{...sec,groups}:null;
  }).filter(Boolean);

  const total=selCount(p);
  const BACK_IDS=['ob','zone','press'];
  const frontSecs=activeSecs.filter(s=>!BACK_IDS.includes(s.id));
  const backSecs=activeSecs.filter(s=>BACK_IDS.includes(s.id));
  const frontCols=Math.min(frontSecs.length,3)||1;
  const backCols=Math.min(backSecs.length,3)||1;

  const renderSecs=secs=>secs.map(sec=>{
    const sc=sec.color;
    return`<div class="card-col">
      <div class="card-sec-hdr" style="background:${sec.bg||'#F4F4F4'};border-color:${sc}">
        <span class="card-sec-label" style="color:${sc}">${esc(sec.label)}</span>
      </div>
      ${sec.groups.map(grp=>{
        const gc=grp.color||sec.color;
        const gb=grp.bg||sec.bg;
        const isFamSel=(p.familySelections||{})[grp.id]===true;
        return`<div>
          <div class="card-grp-hdr" style="background:${gb};border-color:${gc}">
            <span class="card-grp-code" style="color:${gc}">${isFamSel?'&#9733;':esc(grp.code)}</span>
            <span class="card-grp-name">${esc(grp.name)}</span>
          </div>
          ${isFamSel?'':(grp.subs?grp.subs.map(sub=>`
            <div class="card-sub-hdr" style="border-color:${sc}">
              <span class="card-sub-code" style="color:${sc}">${esc(sub.code)}</span>
              <span class="card-sub-name">${esc(sub.name)}</span>
            </div>
            ${sub.plays.map((pl,i)=>renderCardPlay(pl,sc,i%2===1,true,getPlayers(pl.id))).join('')}
          `).join('')
          :grp.plays.map((pl,i)=>renderCardPlay(pl,gc,i%2===1,false,getPlayers(pl.id))).join(''))}
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  const cardHdr=sub=>`
    <div class="card-hdr">
      <div>
        <div class="card-eyebrow">Bishop Dwenger High School &middot; Fort Wayne, Indiana</div>
        <div class="card-title">Boys' Basketball &mdash; Offensive Game Card${sub?' <span style="font-size:11px;opacity:.6">'+sub+'</span>':''}</div>
      </div>
      <div style="text-align:right">
        <div class="card-opp">vs. ${p.opponent?esc(p.opponent):'&mdash;'}</div>
        <div class="card-date">${p.date?fmtDate(p.date):'&mdash;'}</div>
        <div class="card-coach">Ben Smith &middot; Head Coach</div>
      </div>
    </div>`;

  const footer=`<div class="card-footer"><span class="card-footer-text">Bishop Dwenger Boys' Basketball &middot; Offensive Game Card &middot; Ben Smith &middot; Head Coach</span></div>`;

  return`
  <div class="print-controls no-print">
    <button class="btn btn-ghost btn-sm" data-a="go-builder">&larr; Back</button>
    <span style="color:#fff;font-weight:bold;flex:1">${p.opponent?esc(p.opponent):'Game Plan'} &mdash; Print Preview
      ${total===0?'<span style="color:#f99;font-size:12px;margin-left:10px">&#9888; No plays selected</span>':''}</span>
    <button class="btn btn-gold" onclick="downloadPDF()">&#11015; Download PDF</button>
  </div>
  <div class="print-area">
    ${cardHdr('')}
    ${total===0
      ?`<div class="card-no-plays">No plays selected for this game plan.</div>`
      :`<div class="card-body" style="grid-template-columns:repeat(${frontCols},1fr)">
          ${renderSecs(frontSecs)}
        </div>
        ${footer}
        <div class="back-page" style="page-break-before:always;break-before:page">
          ${cardHdr('(OB &middot; Zone &middot; Press)')}
          ${backSecs.length===0
            ?`<div class="card-no-plays" style="font-size:12px;padding:24px">No OB / Zone / Press plays selected.</div>`
            :`<div class="card-body" style="grid-template-columns:repeat(${backCols},1fr)">
                ${renderSecs(backSecs)}
              </div>`}
          ${footer}
        </div>`
    }
  </div>`;
}

function renderCardPlay(play,color,alt,indent,players){
  const bg=play.ctr?'#f3eeff':alt?'#fafafa':'#fff';
  const cc=play.ctr?'#5B2D8E':'#999';
  return`<div class="card-play${indent?' indent':''}" style="background:${bg}">
    <div class="card-play-line">
      <span class="card-play-code${play.ctr?' ctr':''}" style="color:${cc}">${esc(play.code)}</span>
      <span class="card-play-name${play.ctr?' ctr':''}">${esc(play.name)}</span>
    </div>
    ${players.length?`<div class="card-players">${players.map(pl=>`<span class="card-chip">#${pl.number}</span>`).join('')}</div>`:''}
  </div>`;
}

function pbUid(){return 'pb'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function pbMoveArr(arr,idx,dir){
  const a=[...arr];
  const swap=idx+dir;
  if(swap<0||swap>=a.length)return a;
  [a[idx],a[swap]]=[a[swap],a[idx]];
  return a;
}

function renderPlaybookModal(){
  const pb=S.pb;
  const mode=pb.mode||null;
  const expSec=pb.expandSecs||{};
  const expGrp=pb.expandGrps||{};

  function colorSwatches(selected,prefix){
    return SEC_COLORS.map((c,i)=>
      `<span class="pb-color-swatch${selected===c.color?' active':''}"
        style="background:${c.color}"
        data-a="pb-pick-color" data-prefix="${prefix}" data-idx="${i}"
        title="${c.name}"></span>`
    ).join('');
  }

  function playRows(plays,secIdx,grpIdx,subIdx){
    const targetKey=subIdx!=null?`${secIdx}-${grpIdx}-${subIdx}`:`${secIdx}-${grpIdx}`;
    return plays.map((pl,pIdx)=>{
      const isEdit=mode==='edit-play'&&pb.target===`${targetKey}-${pIdx}`;
      if(isEdit){
        return`<div class="pb-form" style="margin:3px 0">
          <div class="pb-form-title">Edit Play</div>
          <div class="pb-form-row">
            <div class="pb-form-col" style="max-width:90px">
              <div class="pb-form-lbl">Code</div>
              <input class="inp" style="font-size:12px;padding:4px 7px" value="${esc(pb.playForm.code)}" data-a="pb-form-play-code">
            </div>
            <div class="pb-form-col">
              <div class="pb-form-lbl">Name</div>
              <input class="inp" style="font-size:12px;padding:4px 7px" value="${esc(pb.playForm.name)}" data-a="pb-form-play-name">
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
            <label style="font-size:11px;color:#555;display:flex;align-items:center;gap:5px;cursor:pointer">
              <input type="checkbox" ${pb.playForm.ctr?'checked':''} data-a="pb-form-play-ctr">
              Counter / CTR play
            </label>
          </div>
          <div class="pb-form-actions">
            <button class="btn btn-ghost btn-sm" data-a="pb-cancel">Cancel</button>
            <button class="btn btn-navy btn-sm" data-a="pb-save-play" data-target="${targetKey}-${pIdx}">Save</button>
          </div>

      }
      return`<div class="pb-play-row">
        <span class="pb-play-code">${esc(pl.code)}</span>
        <span class="pb-play-name">${esc(pl.name)}</span>
        ${pl.ctr?'<span class="pb-ctr-badge">CTR</span>':''}
        <div class="pb-row-actions">
          <button class="pb-btn pb-btn-move" data-a="pb-move-play" data-target="${targetKey}-${pIdx}" data-dir="-1" title="Move up">▲</button>
          <button class="pb-btn pb-btn-move" data-a="pb-move-play" data-target="${targetKey}-${pIdx}" data-dir="1" title="Move down">▼</button>
          <button class="pb-btn" data-a="pb-edit-play" data-target="${targetKey}-${pIdx}">Edit</button>
          <button class="pb-btn pb-btn-danger" data-a="pb-del-play" data-target="${targetKey}-${pIdx}">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  function addPlayForm(targetKey){
    if(mode!=='add-play'||pb.target!==targetKey)return'';
    return`<div class="pb-form" style="margin-top:5px">
      <div class="pb-form-title">New Play</div>
      <div class="pb-form-row">
        <div class="pb-form-col" style="max-width:90px">
          <div class="pb-form-lbl">Code</div>
          <input class="inp" style="font-size:12px;padding:4px 7px" placeholder='"11"' value="${esc(pb.playForm.code)}" data-a="pb-form-play-code">
        </div>
        <div class="pb-form-col">
          <div class="pb-form-lbl">Name</div>
          <input class="inp" style="font-size:12px;padding:4px 7px" placeholder="Play description" value="${esc(pb.playForm.name)}" data-a="pb-form-play-name">
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
        <label style="font-size:11px;color:#555;display:flex;align-items:center;gap:5px;cursor:pointer">
          <input type="checkbox" ${pb.playForm.ctr?'checked':''} data-a="pb-form-play-ctr"> Counter / CTR play
        </label>
      </div>
      <div class="pb-form-actions">
        <button class="btn btn-ghost btn-sm" data-a="pb-cancel">Cancel</button>
        <button class="btn btn-navy btn-sm" data-a="pb-save-play" data-target="${targetKey}">Save</button>
      </div>
    </div>`;
  }

  function renderGroup(grp,secIdx,grpIdx){
    const grpKey=`${secIdx}-${grpIdx}`;
    const isExpanded=expGrp[grpKey]!==false;
    const isEditGrp=mode==='edit-grp'&&pb.target===grpKey;
    const gc2=grp.color||SYSTEM[secIdx].color;

    let grpBodyHtml='';
    if(isExpanded){
      if(grp.subs){
        // sub-groups (e.g. Secondary Break)
        grpBodyHtml=grp.subs.map((sub,subIdx)=>{
          const subKey=`${grpKey}-${subIdx}`;
          const isEditSub=mode==='edit-sub'&&pb.target===subKey;

            <div class="pb-sub-hdr">
              <span style="min-width:36px;color:#666;font-size:11px">${esc(sub.code)}</span>

                <button class="pb-btn pb-btn-danger" data-a="pb-del-sub" data-target="${subKey}">✕</button>
              </div>`}
            </div>
            ${isEditSub?`<div class="pb-form">
              <div class="pb-form-row">
                <div class="pb-form-col" style="max-width:90px">
                  <div class="pb-form-lbl">Code</div>
                  <input class="inp" style="font-size:12px;padding:4px 7px" value="${esc(pb.subForm.code)}" data-a="pb-form-sub-code">
                </div>
                <div class="pb-form-col">
                  <div class="pb-form-lbl">Name</div>
                  <input class="inp" style="font-size:12px;padding:4px 7px" value="${esc(pb.subForm.name)}" data-a="pb-form-sub-name">
                </div>
              </div>
              <div class="pb-form-actions">
                <button class="btn btn-ghost btn-sm" data-a="pb-cancel">Cancel</button>
                <button class="btn btn-navy btn-sm" data-a="pb-save-sub" data-target="${subKey}">Save</button>
              </div>
            </div>`:''}
            ${playRows(sub.plays||[],secIdx,grpIdx,subIdx)}
            ${addPlayForm(subKey)}
            ${mode!=='add-play'||pb.target!==subKey?`<button class="pb-add-btn" data-a="pb-add-play" data-target="${subKey}">+ Add Play</button>`:''}
          </div>`;
        }).join('')+
        `<button class="pb-add-btn" data-a="pb-add-sub" data-target="${grpKey}">+ Add Sub-Group</button>
        ${addPlayForm(grpKey+'--extra')}`;
      } else {
        grpBodyHtml=playRows(grp.plays||[],secIdx,grpIdx,null)+
          addPlayForm(grpKey)+
          (mode!=='add-play'||pb.target!==grpKey
            ?`<button class="pb-add-btn" data-a="pb-add-play" data-target="${grpKey}">+ Add Play</button>`:'');
      }
    }

    return`<div class="pb-group">
      <div class="pb-grp-hdr" data-a="pb-toggle-grp" data-target="${grpKey}">
        <span style="font-size:12px;color:#999">${isExpanded?'▾':'▸'}</span>

          <button class="pb-btn pb-btn-move" data-a="pb-move-grp" data-target="${grpKey}" data-dir="-1">▲</button>

          <button class="pb-btn pb-btn-danger" data-a="pb-del-grp" data-target="${grpKey}">✕</button>
        </div>
      </div>
      ${isEditGrp?`<div class="pb-form">
        <div class="pb-form-title">Edit Group</div>
        <div class="pb-form-row">
          <div class="pb-form-col" style="max-width:90px">
            <div class="pb-form-lbl">Code</div>
            <input class="inp" style="font-size:12px;padding:4px 7px" value="${esc(pb.grpForm.code)}" data-a="pb-form-grp-code">
          </div>
          <div class="pb-form-col">
            <div class="pb-form-lbl">Name</div>
            <input class="inp" style="font-size:12px;padding:4px 7px" value="${esc(pb.grpForm.name)}" data-a="pb-form-grp-name">
          </div>
        </div>
        <div class="pb-form-lbl">Accent Color (leave default to inherit section color)</div>

          <button class="btn btn-ghost btn-sm" data-a="pb-cancel">Cancel</button>
          <button class="btn btn-navy btn-sm" data-a="pb-save-grp" data-target="${grpKey}">Save</button>

      </div>`:''}
      ${isExpanded?`<div class="pb-grp-body">${grpBodyHtml}</div>`:''}

  const sectionsHtml=SYSTEM.map((sec,secIdx)=>{

    const isExpanded=expSec[secKey]!==false;
    const isEditSec=mode==='edit-sec'&&pb.target===secKey;

    const totalPlays=sec.groups.reduce((n,g)=>n+(g.subs?g.subs.reduce((m,s)=>m+(s.plays||[]).length,0):(g.plays||[]).length),0);

    return`<div class="pb-section">

          </div>
        </div>`
        :`<button class="pb-add-btn" data-a="pb-add-grp" data-target="${secKey}">+ Add Group</button>`}
      </div>`:''}
    </div>`;
  }).join('');

  const isAddSec=mode==='add-sec';

  return`<div class="pb-modal" id="modal-pb-overlay">

        <span class="pb-hdr-title">&#128218; Playbook Editor</span>
        <button class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,.3)" data-a="pb-reset">Reset to Defaults</button>

          <div class="pb-form-row">
            <div class="pb-form-col">
              <div class="pb-form-lbl">Label</div>
              <input class="inp" style="font-size:12px;padding:4px 7px" placeholder="Section name" value="${esc(pb.secForm.label)}" data-a="pb-form-sec-label">
            </div>
          </div>
          <div class="pb-form-lbl">Color</div>
          <div class="pb-colors">${colorSwatches(pb.secForm.color,'sec')}</div>
          <div class="pb-form-actions" style="margin-top:8px">
            <button class="btn btn-ghost btn-sm" data-a="pb-cancel">Cancel</button>
            <button class="btn btn-navy btn-sm" data-a="pb-save-sec" data-target="new">Save</button>
          </div>
        </div>`
        :`<button class="pb-add-btn" style="margin-top:6px" data-a="pb-add-sec">+ Add Section</button>`}
      </div>
      <div class="pb-footer">
        <span style="font-size:11px;color:#999;flex:1">${SYSTEM.length} sections · ${SYSTEM.reduce((n,s)=>n+s.groups.length,0)} groups</span>
        <button class="btn btn-gold" data-a="close-playbook">Done</button>
      </div>
    </div>
  </div>`;
}

function attachHandlers(){
  const opp=document.getElementById('opp-input');
  const dt=document.getElementById('date-input');
  if(opp) opp.addEventListener('input',e=>{S.plan.opponent=e.target.value;});
  if(dt)  dt.addEventListener('input',e=>{S.plan.date=e.target.value;});
  const rn=document.getElementById('r-num');
  const rname=document.getElementById('r-name');
  const rtype=document.getElementById('r-type');
  if(rn)    rn.addEventListener('input',e=>{S.rNum=e.target.value.replace(/\D/,'');});
  if(rname){rname.addEventListener('input',e=>{S.rName=e.target.value;});
            rname.addEventListener('keydown',e=>{if(e.key==='Enter')doAddPlayer();});}
  if(rtype) rtype.addEventListener('change',e=>{S.rType=e.target.value;});
  document.querySelectorAll('[data-a="assign-player"]').forEach(el=>{
    el.addEventListener('change',e=>{
      const pid=el.dataset.pid;
      const rid=e.target.value;
      if(!rid)return;
      const sel={...S.plan.selections};
      if(!sel[pid])sel[pid]=[];
      if(!sel[pid].includes(rid))sel[pid]=[...sel[pid],rid];
      setState({plan:{...S.plan,selections:sel},showDropFor:null});
    });
  });
  const impFile=document.getElementById('import-file');
  if(impFile) impFile.addEventListener('change',e=>{if(e.target.files[0])doImport(e.target.files[0]);});
}

function handleClick(e){
  if(e.target.id==='modal-overlay'){setState({showRoster:false});return;}
  const el=e.target.closest('[data-a]');
  if(!el)return;
  const a=el.dataset.a;
  if(a==='new-plan')     setState({plan:mkPlan(),view:'builder',openGroups:{},showDropFor:null,savedMsg:false});
  else if(a==='edit-plan'){const p=S.plans.find(x=>x.id===el.dataset.id);setState({plan:{...p},view:'builder',openGroups:{},showDropFor:null,savedMsg:false});}
  else if(a==='print-plan'){const p=S.plans.find(x=>x.id===el.dataset.id);setState({plan:{...p},view:'print'});}
  else if(a==='ask-del')    setState({confirmDel:el.dataset.id});
  else if(a==='cancel-del') setState({confirmDel:null});
  else if(a==='confirm-del'){setState({plans:S.plans.filter(p=>p.id!==el.dataset.id),confirmDel:null});}
  else if(a==='open-roster'){setState({showRoster:true,rNum:'',rName:'',rType:'varsity',rErr:''});}
  else if(a==='close-roster'){setState({showRoster:false});}
  else if(a==='save-roster'){persist(SK.roster,S.roster);setState({showRoster:false});}
  else if(a==='add-player') doAddPlayer();
  else if(a==='del-player') setState({roster:S.roster.filter(r=>r.id!==el.dataset.rid)});
  else if(a==='go-home')    setState({view:'home',plan:null});
  else if(a==='go-builder') setState({view:'builder'});
  else if(a==='go-print')   setState({view:'print'});
  else if(a==='save-plan')  doSavePlan();
  else if(a==='toggle-grp-open'){
    const og={...S.openGroups};
    og[el.dataset.gid]=!isOpen(el.dataset.gid);
    setState({openGroups:og});
  }
  else if(a==='toggle-family'){
    const gid=el.dataset.gid;
    const ids=(el.dataset.ids||'').split(',').filter(Boolean);
    const fsel={...(S.plan.familySelections||{})};
    const sel={...S.plan.selections};
    if(fsel[gid]){
      // Deselect family
      delete fsel[gid];
    } else {
      // Select as family — clear any individual play selections for this group
      ids.forEach(id=>delete sel[id]);
      fsel[gid]=true;
    }
    setState({plan:{...S.plan,selections:sel,familySelections:fsel},showDropFor:null});
  }
  else if(a==='toggle-all'){
    const ids=el.dataset.ids.split(',');
    const allOn=el.dataset.allon==='true';
    const sel={...S.plan.selections};
    // Also clear any family selection for this group (switching to individual mode)
    const fsel={...(S.plan.familySelections||{})};
    // Find which group this belongs to and remove its family selection
    SYSTEM.forEach(sec=>sec.groups.forEach(grp=>{
      if(grpIds(grp).some(id=>ids.includes(id))) delete fsel[grp.id];
    }));
    ids.forEach(id=>{if(allOn)delete sel[id];else if(sel[id]===undefined)sel[id]=[];});
    setState({plan:{...S.plan,selections:sel,familySelections:fsel},showDropFor:null});
  }
  else if(a==='toggle-play'){
    const pid=el.dataset.pid;
    const sel={...S.plan.selections};
    const fsel={...(S.plan.familySelections||{})};
    // If this play's group is family-selected, switch to individual mode
    SYSTEM.forEach(sec=>sec.groups.forEach(grp=>{
      if(grpIds(grp).includes(pid)&&fsel[grp.id]){delete fsel[grp.id];}
    }));
    if(sel[pid]!==undefined)delete sel[pid];else sel[pid]=[];
    setState({plan:{...S.plan,selections:sel,familySelections:fsel},showDropFor:null});
  }
  else if(a==='remove-player'){
    const {pid,rid}=el.dataset;
    const sel={...S.plan.selections};
    sel[pid]=(sel[pid]||[]).filter(x=>x!==rid);
    setState({plan:{...S.plan,selections:sel}});
  }
  else if(a==='show-drop')  setState({showDropFor:el.dataset.pid});
  else if(a==='confirm-import'){
    if(S.pendingImport&&!S.pendingImport.error){
      setState({roster:S.pendingImport.roster,plans:S.pendingImport.plans,pendingImport:null});
    }
  }
  else if(a==='cancel-import') setState({pendingImport:null});

  else if(a==='open-playbook') setState({showPlaybook:true});
  else if(a==='close-playbook') setState({showPlaybook:false,pb:{...S.pb,mode:null,target:null}});
  else if(a==='pb-reset'){
    if(confirm('Reset the playbook to defaults? This cannot be undone.')){
      SYSTEM=[...DEFAULT_SYSTEM];savePlaybook();setState({pb:{...S.pb,mode:null,target:null}});
    }
  }
  // expand/collapse
  else if(a==='pb-toggle-sec'){
    if(e.target.closest('.pb-row-actions'))return;
    const es={...S.pb.expandSecs};
    es[el.dataset.target]=es[el.dataset.target]===false?true:false;
    setState({pb:{...S.pb,expandSecs:es,mode:null}});
  }
  else if(a==='pb-toggle-grp'){
    if(e.target.closest('.pb-row-actions'))return;
    const eg={...S.pb.expandGrps};
    eg[el.dataset.target]=eg[el.dataset.target]===false?true:false;
    setState({pb:{...S.pb,expandGrps:eg,mode:null}});
  }
  // color picker
  else if(a==='pb-pick-color'){
    const c=SEC_COLORS[parseInt(el.dataset.idx)];
    const pfx=el.dataset.prefix;
    if(pfx==='sec') _pbColor.sec=c; else _pbColor.grp=c;
    // Update swatch visuals directly — no re-render
    document.querySelectorAll('[data-a="pb-pick-color"][data-prefix="'+pfx+'"]').forEach(sw=>{
      sw.classList.toggle('active', sw.dataset.idx===el.dataset.idx);
    });
  }
  // form field changes (handled via change/input events in attachHandlers)
  // cancel
  else if(a==='pb-cancel') setState({pb:{...S.pb,mode:null,target:null}});
  // ── SECTION ──────────────────────────────────────────────────────────────
  else if(a==='pb-add-sec'){
    _pbColor.sec=SEC_COLORS[0];_pbColor.grp=null;
    setState({pb:{...S.pb,mode:'add-sec',target:'new',secForm:{label:'',color:'#C9A84C',bg:'#FEFCE8'}}});
  }
  else if(a==='pb-edit-sec'){
    const si=parseInt(el.dataset.target);
    const sec=SYSTEM[si];
    _pbColor.sec=SEC_COLORS.find(c=>c.color===sec.color)||SEC_COLORS[0];
    setState({pb:{...S.pb,mode:'edit-sec',target:el.dataset.target,secForm:{label:sec.label,color:sec.color,bg:sec.bg}}});
  }
  else if(a==='pb-save-sec'){
    const t=el.dataset.target;
    const f=pbReadForm();
    if(!f.secLabel)return;
    const c=_pbColor.sec||SEC_COLORS[0];
    if(t==='new'){
      SYSTEM=[...SYSTEM,{id:pbUid(),label:f.secLabel,color:c.color,bg:c.bg,groups:[]}];
    } else {
      const si=parseInt(t);
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,label:f.secLabel,color:c.color,bg:c.bg}:s);
    }
    savePlaybook();setState({pb:{...S.pb,mode:null,target:null}});
  }
  else if(a==='pb-del-sec'){
    const si=parseInt(el.dataset.target);
    if(confirm(`Delete section "${SYSTEM[si].label}"? All groups and plays inside it will be removed.`)){
      SYSTEM=SYSTEM.filter((_,i)=>i!==si);
      savePlaybook();setState({pb:{...S.pb,mode:null,target:null}});
    }
  }
  else if(a==='pb-move-sec'){
    const si=parseInt(el.dataset.target),dir=parseInt(el.dataset.dir);
    SYSTEM=pbMoveArr(SYSTEM,si,dir);
    savePlaybook();setState({pb:{...S.pb,mode:null}});
  }
  // ── GROUP ────────────────────────────────────────────────────────────────
  else if(a==='pb-add-grp'){
    _pbColor.grp=null;
    setState({pb:{...S.pb,mode:'add-grp',target:el.dataset.target,grpForm:{code:'',name:'',color:''}}});
  }
  else if(a==='pb-edit-grp'){
    const [si,gi]=el.dataset.target.split('-').map(Number);
    const grp=SYSTEM[si].groups[gi];
    _pbColor.grp=grp.color?SEC_COLORS.find(c=>c.color===grp.color)||null:null;
    setState({pb:{...S.pb,mode:'edit-grp',target:el.dataset.target,grpForm:{code:grp.code,name:grp.name,color:grp.color||''}}});
  }
  else if(a==='pb-save-grp'){
    const t=el.dataset.target;
    const f=pbReadForm();
    if(!f.grpName)return;
    const parts=t.split('-').map(Number);
    const grpColor=_pbColor.grp?_pbColor.grp.color:undefined;
    if(parts.length===1){
      const si=parts[0];
      const newGrp={id:pbUid(),code:f.grpCode,name:f.grpName,plays:[]};
      if(grpColor) newGrp.color=grpColor;
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:[...s.groups,newGrp]}:s);
    } else {
      const [si,gi]=parts;
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,code:f.grpCode,name:f.grpName,color:grpColor||undefined}:g)}:s);
    }
    savePlaybook();setState({pb:{...S.pb,mode:null,target:null}});
  }
  else if(a==='pb-del-grp'){
    const [si,gi]=el.dataset.target.split('-').map(Number);
    if(confirm(`Delete group "${SYSTEM[si].groups[gi].name}"?`)){
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.filter((_,j)=>j!==gi)}:s);
      savePlaybook();setState({pb:{...S.pb,mode:null,target:null}});
    }
  }
  else if(a==='pb-move-grp'){
    const [si,gi]=el.dataset.target.split('-').map(Number);const dir=parseInt(el.dataset.dir);
    SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:pbMoveArr(s.groups,gi,dir)}:s);
    savePlaybook();setState({pb:{...S.pb,mode:null}});
  }
  // ── SUB ──────────────────────────────────────────────────────────────────
  else if(a==='pb-add-sub'){
    setState({pb:{...S.pb,mode:'add-sub',target:el.dataset.target,subForm:{code:'',name:''}}});
  }
  else if(a==='pb-edit-sub'){
    const [si,gi,subi]=el.dataset.target.split('-').map(Number);
    const sub=SYSTEM[si].groups[gi].subs[subi];
    setState({pb:{...S.pb,mode:'edit-sub',target:el.dataset.target,subForm:{code:sub.code,name:sub.name}}});
  }
  else if(a==='pb-save-sub'){
    const t=el.dataset.target;const parts=t.split('-').map(Number);const f=pbReadForm();
    if(!f.subName)return;
    if(parts.length===2){
      // add new sub to group
      const [si,gi]=parts;
      const newSub={id:pbUid(),code:f.subCode,name:f.subName,plays:[]};
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,subs:[...(g.subs||[]),newSub]}:g)}:s);
    } else {
      const [si,gi,subi]=parts;
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,subs:g.subs.map((sub,k)=>k===subi?{...sub,code:f.subCode,name:f.subName}:sub)}:g)}:s);
    }
    savePlaybook();setState({pb:{...S.pb,mode:null,target:null}});
  }
  else if(a==='pb-del-sub'){
    const [si,gi,subi]=el.dataset.target.split('-').map(Number);
    if(confirm('Delete this sub-group and all its plays?')){
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,subs:g.subs.filter((_,k)=>k!==subi)}:g)}:s);
      savePlaybook();setState({pb:{...S.pb,mode:null,target:null}});
    }
  }
  else if(a==='pb-move-sub'){
    const [si,gi,subi]=el.dataset.target.split('-').map(Number);const dir=parseInt(el.dataset.dir);
    SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,subs:pbMoveArr(g.subs,subi,dir)}:g)}:s);
    savePlaybook();setState({pb:{...S.pb,mode:null}});
  }
  // ── PLAY ─────────────────────────────────────────────────────────────────
  else if(a==='pb-add-play'){
    setState({pb:{...S.pb,mode:'add-play',target:el.dataset.target,playForm:{code:'',name:'',ctr:false}}});
  }
  else if(a==='pb-edit-play'){
    const parts=el.dataset.target.split('-').map(Number);
    const pIdx=parts[parts.length-1];
    let play;
    if(parts.length===3){const[si,gi,pi]=parts;play=SYSTEM[si].groups[gi].plays[pi];}
    else{const[si,gi,subi,pi]=parts;play=SYSTEM[si].groups[gi].subs[subi].plays[pi];}
    setState({pb:{...S.pb,mode:'edit-play',target:el.dataset.target,playForm:{code:play.code,name:play.name,ctr:!!play.ctr}}});
  }
  else if(a==='pb-save-play'){
    const t=el.dataset.target;const parts=t.split('-').map(Number);const f=pbReadForm();
    if(!f.playName)return;
    const newPlay={id:pbUid(),code:f.playCode,name:f.playName};
    if(f.playCtr)newPlay.ctr=true;
    if(parts.length===2){
      // add to group.plays
      const[si,gi]=parts;
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,plays:[...(g.plays||[]),newPlay]}:g)}:s);
    } else if(parts.length===3){
      // add or edit group.plays[pi]
      const[si,gi,pi]=parts;
      if(S.pb.mode==='add-play'){
        SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,plays:[...(g.plays||[]),newPlay]}:g)}:s);
      } else {
        SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,plays:g.plays.map((p,k)=>k===pi?{...p,...newPlay}:p)}:g)}:s);
      }
    } else {
      // sub play: 4 parts
      const[si,gi,subi,pi]=parts;
      if(S.pb.mode==='add-play'){
        SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,subs:g.subs.map((sub,k)=>k===subi?{...sub,plays:[...(sub.plays||[]),newPlay]}:sub)}:g)}:s);
      } else {
        SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,subs:g.subs.map((sub,k)=>k===subi?{...sub,plays:sub.plays.map((p,m)=>m===pi?{...p,...newPlay}:p)}:sub)}:g)}:s);
      }
    }
    savePlaybook();setState({pb:{...S.pb,mode:null,target:null}});
  }
  else if(a==='pb-del-play'){
    const parts=el.dataset.target.split('-').map(Number);
    if(parts.length===3){
      const[si,gi,pi]=parts;
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,plays:g.plays.filter((_,k)=>k!==pi)}:g)}:s);
    } else {
      const[si,gi,subi,pi]=parts;
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,subs:g.subs.map((sub,k)=>k===subi?{...sub,plays:sub.plays.filter((_,m)=>m!==pi)}:sub)}:g)}:s);
    }
    savePlaybook();setState({pb:{...S.pb,mode:null,target:null}});
  }
  else if(a==='pb-move-play'){
    const parts=el.dataset.target.split('-').map(Number);const dir=parseInt(el.dataset.dir);
    if(parts.length===3){
      const[si,gi,pi]=parts;
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,plays:pbMoveArr(g.plays,pi,dir)}:g)}:s);
    } else {
      const[si,gi,subi,pi]=parts;
      SYSTEM=SYSTEM.map((s,i)=>i===si?{...s,groups:s.groups.map((g,j)=>j===gi?{...g,subs:g.subs.map((sub,k)=>k===subi?{...sub,plays:pbMoveArr(sub.plays,pi,dir)}:sub)}:g)}:s);
    }
    savePlaybook();setState({pb:{...S.pb,mode:null}});
  }
  else if(a==='dup-plan'){
    const src=S.plans.find(x=>x.id===el.dataset.id);
    if(src){
      const copy={...JSON.parse(JSON.stringify(src)),
        id:uid(),
        opponent:(src.opponent?src.opponent+' (copy)':'Copy'),
        createdAt:new Date().toISOString(),
        updatedAt:new Date().toISOString()};
      setState({plans:[copy,...S.plans]});
      showToast('Game plan copied');
    }
  }
  else if(a==='save-template'){
    const name=prompt('Template name (e.g. "vs Zone" or "Conference Game"):');
    if(!name||!name.trim()) return;
    const t={id:uid(),name:name.trim(),createdAt:new Date().toISOString(),
      selections:{...S.plan.selections},familySelections:{...S.plan.familySelections||{}}};
    const templates=[t,...S.templates];
    persist(SK.templates,templates);
    setState({templates});
    showToast('Template saved: '+name.trim());
  }
  else if(a==='load-template'){
    const t=S.templates.find(x=>x.id===el.dataset.id);
    if(!t) return;
    if(!confirm('Load template "'+t.name+'"? This will replace current play selections.')) return;
    setState({plan:{...S.plan,selections:{...t.selections},familySelections:{...t.familySelections||{}}}});
    showToast('Template loaded: '+t.name);
  }
  else if(a==='del-template'){
    const templates=S.templates.filter(x=>x.id!==el.dataset.id);
    persist(SK.templates,templates);
    setState({templates});
  }
  else if(a==='export-data') doExport();
}

function showToast(msg,duration=2500){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0A1E3C;color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.25);transition:opacity .3s;pointer-events:none';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity='0';},duration);
}

function doAddPlayer(){
  const num=parseInt(S.rNum);
  const name=S.rName.trim();
  if(!S.rNum||!name){setState({rErr:'Number and name are required.'});return;}
  if(S.roster.some(p=>p.number===num)){setState({rErr:`#${num} is already in use.`});return;}
  const roster=[...S.roster,{id:uid(),number:num,name,type:S.rType}];
  setState({roster,rNum:'',rName:'',rType:'varsity',rErr:''});
}

function doSavePlan(){
  const up={...S.plan,updatedAt:new Date().toISOString()};
  const plans=S.plans.some(x=>x.id===up.id)?S.plans.map(x=>x.id===up.id?up:x):[up,...S.plans];
  setState({plans,plan:up,savedMsg:true});
  setTimeout(()=>setState({savedMsg:false}),2200);
}

function doExport(){
  try{
  const data={version:1,exportedAt:new Date().toISOString(),roster:S.roster,plans:S.plans,playbook:SYSTEM};
  localStorage.setItem(BK_KEY,new Date().toISOString());
  ['gc-bk-ind','gc-bk-ind-b'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='<span style="color:#4ade80"> ✓</span>';});
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='saints-gamecard-'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  }catch(err){console.error('Export error:',err);alert('Export failed: '+err.message);}
}

function doImport(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data.roster)||!Array.isArray(data.plans)){
        setState({pendingImport:{error:true}});return;
      }
      setState({pendingImport:data});
    }catch{setState({pendingImport:{error:true}});}
  };
  reader.readAsText(file);
}



// ── GAME CARD FRONT PAGE: dynamic padding based on visual column content ──────
(function(){
  var _saved = [];
  window.addEventListener('beforeprint', function(){
    if(typeof S === 'undefined' || S.view !== 'print') return;
    var fa = document.querySelector('.print-area > .card-body');
    if(!fa) return;
    var cols = Array.from(fa.querySelectorAll('.card-col'));
    if(!cols.length) return;

    // Group card-cols by visual grid column (index % numCols)
    var numCols = Math.min(cols.length, 3);
    var vcTotals = new Array(numCols).fill(0);
    cols.forEach(function(col, i){
      var n = col.querySelectorAll('.card-play,.card-grp-hdr,.card-sub-hdr,.card-sec-hdr').length;
      vcTotals[i % numCols] += n;
    });
    var maxItems = Math.max.apply(null, vcTotals);
    if(!maxItems) return;

    // Available height (pt): letter minus margins minus header minus footer
    var avail = 630;
    var fontPt = 8.5;
    var itemH  = Math.max(14, Math.floor(avail / maxItems));
    var padPt  = Math.max(2,  Math.floor((itemH - fontPt) / 2));

    var items = fa.querySelectorAll('.card-play,.card-grp-hdr,.card-sub-hdr,.card-sec-hdr');
    _saved = [];
    Array.from(items).forEach(function(el){
      _saved.push({el:el, pt:el.style.paddingTop, pb:el.style.paddingBottom});
      el.style.setProperty('padding-top',    padPt + 'pt', 'important');
      el.style.setProperty('padding-bottom', padPt + 'pt', 'important');
    });
  });
  window.addEventListener('afterprint', function(){
    _saved.forEach(function(s){
      s.el.style.paddingTop    = s.pt;
      s.el.style.paddingBottom = s.pb;
    });
    _saved = [];
  });
})();


// ── DYNAMIC PRINT PADDING ─────────────────────────────────────────────────────
// Sizes rows on both pages so ALL content fits within exactly 2 pages.
// Overhead = header(55pt) + body-padding(10pt) + footer(18pt) = 83pt base.
// fontH = 9pt CSS × 1.2 line-height + 0.3pt border = 11.1pt per row.
// Available for grid = 734pt (letter minus 0.4in margins) - overhead - row gaps.
function applyPrintPadding(){
  var SEL='.card-play,.card-grp-hdr,.card-sub-hdr,.card-sec-hdr';
  var FONT_H=11.1; // rendered row height in pt (font + line-height + border)
  var PAGE_H=734;  // usable page height in pt (11in minus 0.8in margins)
  var BASE_OH=83;  // header + body-padding + footer

  // ── FRONT PAGE ──────────────────────────────────────────────────────────────
  var fa=document.querySelector('.print-area>.card-body');
  if(fa){
    var fcols=Array.from(fa.querySelectorAll('.card-col'));
    if(fcols.length){
      var nc=Math.min(fcols.length,3)||1;
      var nr=Math.ceil(fcols.length/nc);
      // Sum max items per grid row (determines actual page height needed)
      var rowMax=[];
      for(var r=0;r<nr;r++){
        var mx=0;
        for(var c=0;c<nc;c++){
          var idx=r*nc+c;
          if(idx<fcols.length)
            mx=Math.max(mx,fcols[idx].querySelectorAll(SEL).length);
        }
        rowMax.push(mx);
      }
      var tot=rowMax.reduce(function(a,b){return a+b;},0);
      if(tot){
        var avail=PAGE_H-BASE_OH-(5*(nr-1)); // subtract inter-row gaps
        var ih=Math.max(12,Math.floor(avail/tot));
        var pd=Math.max(1,Math.floor((ih-FONT_H)/2));
        fa.querySelectorAll(SEL).forEach(function(el){
          el.style.setProperty('padding-top',   pd+'pt','important');
          el.style.setProperty('padding-bottom',pd+'pt','important');
        });
      }
    }
  }

  // ── BACK PAGE ───────────────────────────────────────────────────────────────
  var ba=document.querySelector('.back-page .card-body');
  if(ba){
    var bcols=Array.from(ba.querySelectorAll('.card-col'));
    var bmx=0;
    bcols.forEach(function(col){
      bmx=Math.max(bmx,col.querySelectorAll(SEL).length);
    });
    if(bmx){
      var bavail=PAGE_H-BASE_OH; // single grid row, no inter-row gap
      var bih=Math.max(12,Math.floor(bavail/bmx));
      var bpd=Math.max(1,Math.floor((bih-FONT_H)/2));
      ba.querySelectorAll(SEL).forEach(function(el){
        el.style.setProperty('padding-top',   bpd+'pt','important');
        el.style.setProperty('padding-bottom',bpd+'pt','important');
      });
    }
  }
}

const NAVY='#0A1E3C', GOLD='#C9A84C', WHITE='#ffffff';
const PW=612, PH=792, M=28, CW=PW-2*M;
// From empirical test: itemH=12, pad=2 fits 40 items on 1 page with our header/footer
// Formula: itemH = floor(colAvail/totalItems) - 2*pad  where colAvail≈667
const COL_AVAIL=667, PAD=2;


// PDF generator uses the app SYSTEM array above


function countItems(sec, fselMap={}){
  let n=1;
  sec.groups.forEach(g=>{
    n++;
    if(fselMap[g.id]) return; // family selected — just the group header row
    if(g.subs) g.subs.forEach(s=>{n++;n+=(s.plays||[]).length;});
    else n+=(g.plays||[]).length;
  });
  return n;
}

function sectionTable(sec, itemH, sel={}, roster=[], fselMap={}){
  const PAD=2;
  const WHITE='#FFFFFF', STRIPE='#F8F8F8';
  const RULE='#E0E0E0', GRULE='#BBBBBB';
  const sc=sec.color;

  const body=[], heights=[], rowTypes=[];
  const getAssigned=pid=>(sel[pid]||[]).map(id=>roster.find(r=>r.id===id)).filter(Boolean).sort((a,b)=>a.number-b.number);
  // No border[] set on cells — hLineWidth/vLineWidth in layout controls all lines
  const add=(cells,h,type)=>{body.push(cells);heights.push(h);rowTypes.push(type);};

  // ── Section header ────────────────────────────────────────────────────────
  add([
    {text:sec.label.toUpperCase(),fontSize:8.5,bold:true,color:sc,fillColor:sec.bg||'#F4F4F4',colSpan:2},{}
  ], itemH+3, 'sec-hdr');

  sec.groups.forEach(grp=>{
    const gc=grp.color||sc;
    const isFam=fselMap[grp.id]===true;

    // ── Group header ──────────────────────────────────────────────────────
    add([
      {text:isFam?'★':grp.code, fontSize:7.5, bold:true, color:isFam?gc:sc, fillColor:WHITE},
      {text:grp.name, fontSize:9.5, bold:true, color:'#0D1B2A', fillColor:WHITE}
    ], itemH+1, 'grp-hdr');
    if(isFam) return;

    if(grp.subs) grp.subs.forEach(sub=>{
      // ── Sub-group header ────────────────────────────────────────────
      add([
        {text:sub.code, fontSize:7, color:sc, fillColor:STRIPE},
        {text:sub.name, fontSize:8, bold:true, color:'#333', fillColor:STRIPE}
      ], itemH, 'sub-hdr');
      sub.plays.forEach((play,pi)=>{
        const ctr=!!play.ctr, nameCol=ctr?'#5B2D8E':'#0D1B2A', codeCol=ctr?'#5B2D8E':sc;
        const bg=pi%2===0?WHITE:STRIPE;
        const ap=getAssigned(play.id);
        const nm=ap.length
          ?{text:[{text:play.name+' ',fontSize:8.5,italics:ctr,color:nameCol},{text:'  '+ap.map(p=>'#'+p.number).join(' '),fontSize:8,bold:true,color:'#0D1B2A'}]}
          :{text:play.name,fontSize:8.5,italics:ctr,color:nameCol};
        add([{text:'  '+play.code,fontSize:6.5,color:codeCol,fillColor:bg},{...nm,fillColor:bg}], itemH, 'play');
      });
    });
    else grp.plays.forEach((play,pi)=>{
      const bg=pi%2===0?WHITE:STRIPE;
      const ap=getAssigned(play.id);
      const nm=ap.length
        ?{text:[{text:play.name+' ',fontSize:8.5,color:'#0D1B2A'},{text:'  '+ap.map(p=>'#'+p.number).join(' '),fontSize:8,bold:true,color:'#0D1B2A'}]}
        :{text:play.name,fontSize:8.5,color:'#0D1B2A'};
      add([{text:play.code,fontSize:7,color:sc,fillColor:bg},{...nm,fillColor:bg}], itemH, 'play');
    });
  });

  const n=body.length;
  return {
    table:{widths:[32,'*'],heights,body},
    layout:{
      // hLineWidth(i): line between row[i-1] and row[i]. i=0=top, i=n=bottom.
      hLineWidth:(i)=>{
        if(i===0) return 0.3;           // thin top border of section
        if(i===n) return 0.3;           // thin bottom border
        const prev=rowTypes[i-1];
        const next=rowTypes[i];
        if(prev==='sec-hdr') return 1.5; // bold colored marker underline
        if(prev==='grp-hdr') return 0.6; // stronger group separator
        if(prev==='sub-hdr') return 0.4; // sub-header bottom
        if(next==='grp-hdr') return 0.5; // above next group header
        if(next==='sub-hdr') return 0.4; // above sub-header
        return 0.3;                       // play-to-play gridline
      },
      hLineColor:(i)=>{
        if(i===0||i===n) return RULE;
        const prev=rowTypes[i-1];
        if(prev==='sec-hdr') return sc;   // section accent color
        if(prev==='grp-hdr') return GRULE;
        return RULE;
      },
      vLineWidth:(i)=>{
        if(i===0||i===2) return 0;  // no outer left/right borders
        return 0.5;                  // separator: code | name
      },
      vLineColor:()=>RULE,
      paddingLeft:()=>4,paddingRight:()=>4,
      paddingTop:()=>PAD,paddingBottom:()=>PAD
    }
  };
}

function buildPage(plan, secs, subtitle, firstPage=true, sel={}, roster=[], fselMap={}){
  const NAVY='#0A1E3C', GOLD='#C9A84C', WHITE='#ffffff';
  const M=28, CW=556, COL_AVAIL=667, PAD=2;
  if(!secs.length) return [{text:'',fontSize:1}];
  const numCols=Math.min(secs.length,3);
  const numGridRows=Math.ceil(secs.length/numCols);

  // totalItems = sum of max items per grid row
  let totalItems=0;
  for(let r=0;r<numGridRows;r++){
    let mx=0;
    for(let c=0;c<numCols;c++){const i=r*numCols+c;if(i<secs.length)mx=Math.max(mx,countItems(secs[i],fselMap));}
    totalItems+=mx;
  }

  const itemH=Math.max(10, Math.min(26, Math.floor(COL_AVAIL/totalItems) - 2*PAD));
  console.log(`  ${subtitle||'front'}: totalItems=${totalItems} itemH=${itemH} (${itemH+2*PAD}pt/row)`);

  const gridBody=[];
  for(let r=0;r<numGridRows;r++){
    const row=[];
    for(let c=0;c<numCols;c++){
      const i=r*numCols+c;
      row.push(i<secs.length ? sectionTable(secs[i],itemH,sel,roster,fselMap) : {text:'',border:[false,false,false,false]});
    }
    gridBody.push(row);
  }

  const hdr=makeHeader(plan,subtitle);
  if(!firstPage) hdr.pageBreak='before';
  return [
    hdr,
    {canvas:[{type:'rect',x:0,y:0,w:CW,h:3,color:GOLD}],margin:[0,0,0,6]},
    {table:{widths:Array(numCols).fill('*'),body:gridBody},
     layout:{hLineWidth:()=>0,vLineWidth:()=>0,paddingLeft:()=>3,paddingRight:()=>3,paddingTop:()=>0,paddingBottom:()=>0}}
  ];
}

function buildGameCardDoc(plan, roster){
  const NAVY='#0A1E3C', GOLD='#C9A84C', WHITE='#ffffff';
  const M=28, CW=556, COL_AVAIL=667, PAD=2;
  const sel=plan.selections||{};
  const fselMap=plan.familySelections||{};
  const active=SYSTEM.map(sec=>{
    const groups=sec.groups.map(grp=>{
      if(fselMap[grp.id]) return grp; // family selected — include as-is
      if(grp.subs){const subs=grp.subs.map(sub=>{const pl=sub.plays.filter(p=>sel[p.id]!==undefined);return pl.length?{...sub,plays:pl}:null;}).filter(Boolean);return subs.length?{...grp,subs}:null;}
      const pl=grp.plays.filter(p=>sel[p.id]!==undefined);return pl.length?{...grp,plays:pl}:null;
    }).filter(Boolean);
    return groups.length?{...sec,groups}:null;
  }).filter(Boolean);

  const BACK=['ob','zone','press'];
  const front=active.filter(s=>!BACK.includes(s.id));
  const back=active.filter(s=>BACK.includes(s.id));

  return {pageSize:'LETTER',pageMargins:[M,M,M,32],defaultStyle:{font:'Roboto',lineHeight:1.05},
    footer:(currentPage,pageCount)=>({
      margin:[0,6,0,0],
      stack:[
        {canvas:[{type:'line',x1:28,y1:0,x2:584,y2:0,lineWidth:0.5,lineColor:'#CCCCCC'}]},
        {text:"Bishop Dwenger Boys' Basketball  ·  Offensive Game Card  ·  Ben Smith  ·  Head Coach",
         fontSize:7,color:'#AAAAAA',alignment:'center',margin:[0,5,0,0]}
      ]
    }),
    content:[...buildPage(plan,front,'',true,sel,roster,fselMap),...buildPage(plan,back,'(OB · Zone · Press)',false,sel,roster,fselMap)]};
}

function downloadPDF() {
  if (!window.pdfMake || !window.pdfMake.vfs) {
    alert('PDF library still loading, please try again in a moment.');
    return;
  }
  showToast('Generating PDF…');
  setTimeout(()=>{try {
    const docDef = buildGameCardDoc(S.plan, S.roster);
    const opp = (S.plan.opponent||'game').replace(/[^a-z0-9]/gi,'_');
    const date = S.plan.date || new Date().toISOString().slice(0,10);
    pdfMake.createPdf(docDef).download('game-card-' + opp + '-' + date + '.pdf');
    showToast('PDF downloaded ✓');
  } catch(e) {
    console.error('PDF error:', e);
    alert('PDF generation error: ' + e.message);
  }
  },50);
}
