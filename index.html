<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<title>Saints — Game Card Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0A1E3C;--gold:#C9A84C;--gold-l:#FEFCE8;
  --green:#1A5C3A;--green-l:#EBF7F0;
  --blue:#1D4E89;--blue-l:#EBF2FB;
  --purple:#5B2D8E;--purp-l:#F3EEFF;
  --lgray:#F4F4F4;--mgray:#999;--dgray:#333;
}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#E0E0E0;min-height:100vh;font-size:14px;color:var(--dgray);}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
.topbar{background:var(--navy);border-bottom:4px solid var(--gold);padding:13px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
.topbar-title{color:#fff;font-weight:bold;font-size:17px;flex:1;}
.topbar-eyebrow{color:var(--gold);font-size:8px;letter-spacing:3px;text-transform:uppercase;display:block;margin-bottom:2px;}
.btn{border:none;border-radius:4px;padding:7px 16px;font-size:13px;font-weight:bold;cursor:pointer;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--gold);color:var(--gold);}
.btn-ghost-sm{background:transparent;border:1px solid #ccc;color:#555;padding:4px 10px;font-size:12px;font-weight:normal;}
.btn-navy-sm{background:var(--navy);color:#fff;padding:4px 10px;font-size:12px;}
.btn-danger-sm{background:#dc2626;color:#fff;padding:4px 10px;font-size:12px;}
.btn-sm{padding:5px 12px;font-size:12px;}
.inp{border:1px solid #ddd;border-radius:4px;padding:6px 10px;font-size:13px;outline:none;background:#fff;}
.inp-dark{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:4px;padding:5px 10px;font-size:13px;outline:none;}
.inp-dark::placeholder{color:rgba(255,255,255,.45);}
.content{max-width:860px;margin:26px auto;padding:0 18px;}
.section-label{color:var(--navy);font-weight:bold;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.plan-card{background:#fff;border:1px solid #ddd;border-left:4px solid var(--gold);border-radius:5px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:8px;}
.plan-card-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.plan-name{font-weight:bold;font-size:16px;color:var(--navy);}
.plan-meta{color:var(--mgray);font-size:11px;margin-top:3px;}
.empty-state{text-align:center;padding:64px 0;color:#888;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.empty-title{font-size:18px;font-weight:bold;color:var(--navy);margin-bottom:6px;}
.section-block{margin-bottom:14px;border-radius:5px;overflow:hidden;border:1px solid #d5d5d5;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.sec-hdr{padding:7px 13px;display:flex;align-items:center;gap:6px;border-bottom-width:2.5px;border-bottom-style:solid;}
.grp-row{padding:6px 12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #ddd;cursor:pointer;user-select:none;}
.grp-code{font-weight:bold;font-size:10px;min-width:48px;}
.grp-name{font-weight:bold;font-size:13px;color:var(--navy);flex:1;}
.grp-toggle{font-size:10px;color:#777;padding:2px 7px;border:1px solid #ccc;border-radius:3px;background:#fff;cursor:pointer;}
.sub-hdr{padding:4px 12px 4px 26px;display:flex;align-items:center;gap:6px;background:#f0f0f0;border-bottom:1px solid #e0e0e0;border-left-width:2.5px;border-left-style:solid;}
.play-row{border-bottom:1px solid #f0f0f0;}
.play-main{padding:5px 12px;display:flex;align-items:center;gap:8px;}
.play-main.indent{padding-left:40px;}
.play-cb{cursor:pointer;width:14px;height:14px;flex-shrink:0;}
.play-code{font-size:10px;min-width:50px;}
.play-name{font-size:13px;flex:1;}
.play-name.ctr{font-style:italic;color:var(--purple);}
.play-code.ctr{font-weight:bold;color:var(--purple);}
.play-assign{padding:4px 12px 5px;border-top:1px solid #e8f0fb;display:flex;align-items:center;flex-wrap:wrap;gap:5px;background:#f7fbff;}
.play-assign.indent{padding-left:40px;}
.assign-label{color:#aaa;font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-right:2px;}
.player-chip{background:var(--navy);color:#fff;border-radius:3px;padding:2px 7px;font-size:11px;display:inline-flex;align-items:center;gap:4px;}
.chip-x{cursor:pointer;opacity:.55;font-size:10px;line-height:1;border:none;background:none;color:#fff;padding:0;}
.add-player-btn{background:none;border:1px dashed var(--gold);color:var(--gold);border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;}
.player-select{border:1px solid var(--gold);border-radius:3px;padding:3px 7px;font-size:12px;outline:none;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:flex-end;}
.modal-panel{background:#fff;width:320px;height:100vh;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.18);display:flex;flex-direction:column;}
.modal-hdr{background:var(--navy);padding:13px 16px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-hdr-title{color:#fff;font-weight:bold;font-size:14px;}
.modal-form{padding:13px 14px;border-bottom:1px solid #eee;background:#fafafa;flex-shrink:0;}
.modal-form-title{font-weight:bold;font-size:11px;color:var(--navy);letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;}
.modal-err{color:#c00;font-size:11px;margin-top:6px;}
.roster-list{flex:1;overflow-y:auto;}
.roster-type-hdr{padding:5px 14px;font-size:9px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:var(--mgray);background:#f5f5f5;border-top:1px solid #eee;border-bottom:1px solid #eee;}
.roster-player{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid #f5f5f5;}
.roster-num{background:var(--navy);color:var(--gold);font-weight:bold;font-size:12px;border-radius:3px;padding:2px 6px;margin-right:10px;min-width:32px;text-align:center;}
.print-controls{background:var(--navy);padding:10px 18px;display:flex;gap:10px;align-items:center;border-bottom:3px solid var(--gold);}
.print-area{background:#fff;max-width:1000px;margin:20px auto;box-shadow:0 2px 16px rgba(0,0,0,.15);}
.card-hdr{background:var(--navy);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid var(--gold);}
.card-eyebrow{color:var(--gold);font-size:8px;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px;}
.card-title{color:#fff;font-size:17px;font-weight:bold;}
.card-opp{color:var(--gold);font-weight:bold;font-size:15px;}
.card-date{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px;}
.card-coach{color:rgba(255,255,255,.4);font-size:10px;margin-top:1px;}
.card-body{padding:12px 14px;display:grid;gap:10px;}
.card-col{border:1px solid #ddd;border-radius:4px;overflow:hidden;font-size:12px;}
.card-sec-hdr{padding:5px 9px;border-bottom-width:2px;border-bottom-style:solid;}
.card-sec-label{font-weight:bold;font-size:8px;letter-spacing:2px;text-transform:uppercase;}
.card-grp-hdr{padding:4px 8px;display:flex;gap:5px;align-items:center;border-bottom:1px solid #e0e0e0;border-left-width:3px;border-left-style:solid;}
.card-grp-code{font-weight:bold;font-size:8px;min-width:36px;}
.card-grp-name{color:var(--navy);font-weight:bold;font-size:10px;}
.card-sub-hdr{padding:3px 8px 3px 13px;display:flex;gap:5px;background:#f2f2f2;border-bottom:1px solid #e8e8e8;border-left-width:2px;border-left-style:solid;}
.card-sub-code{font-weight:bold;font-size:8px;}
.card-sub-name{color:var(--navy);font-weight:bold;font-size:9px;}
.card-play{border-bottom:1px solid #f0f0f0;padding:3px 8px 3px 16px;}
.card-play.indent{padding-left:18px;}
.card-play-line{display:flex;gap:5px;align-items:baseline;}
.card-play-code{font-size:8px;min-width:42px;}
.card-play-name{font-size:10px;flex:1;}
.card-play-name.ctr{font-style:italic;color:var(--purple);}
.card-play-code.ctr{font-weight:bold;color:var(--purple);}
.card-players{padding-left:47px;margin-top:2px;display:flex;flex-wrap:wrap;gap:3px;}
.card-chip{background:var(--navy);color:#fff;font-size:8px;border-radius:2px;padding:1px 5px;}
.card-footer{border-top:1px solid var(--gold);padding:5px 14px;text-align:center;}
.card-footer-text{color:#bbb;font-size:8px;}
.card-no-plays{padding:48px;text-align:center;color:#bbb;font-size:14px;}
.warn-bar{background:#fff8e1;border:1px solid #f5d04a;border-radius:5px;padding:9px 13px;margin-bottom:14px;font-size:12px;color:#7a5900;display:flex;gap:8px;align-items:center;}

  .no-print{display:none!important;}

  .card-play-name{font-size:9pt;}

}
@media print and (max-width:768px){
  @page{margin:0.25in;}

  .card-eyebrow{font-size:5pt;letter-spacing:1pt;}
  .card-title{font-size:10pt;}
  .card-opp{font-size:9pt;}
  .card-date{font-size:7pt;}

  .card-grp-hdr{padding:2pt 4pt;border-left-width:2pt;}

  .card-grp-name{font-size:7.5pt;}
  .card-sub-hdr{padding:1.5pt 4pt 1.5pt 7pt;border-left-width:1.5pt;}
  .card-sub-code{font-size:5pt;}

  .card-play.indent{padding-left:10pt;}
  .card-play-code{font-size:5pt;min-width:24pt;}
  .card-play-name{font-size:6.5pt;}
  .card-players{display:none;}
  .card-footer{padding:2pt 8pt;}
  .card-footer-text{font-size:5pt;}
  .back-page .card-sec-hdr{padding:2pt 4pt!important;}
  .back-page .card-grp-hdr{padding:2pt 4pt!important;}
  .back-page .card-sub-hdr{padding:1.5pt 4pt 1.5pt 7pt!important;}
  .back-page .card-play{padding:1.5pt 4pt 1.5pt 8pt!important;}
  .back-page .card-grp-name{font-size:7.5pt!important;}
  .back-page .card-play-name{font-size:6.5pt!important;}
}
}

<div id="app"></div>
<script>
const SYSTEM=[
  {id:'primary',label:'Primary Transition',color:'#C9A84C',bg:'#FEFCE8',groups:[
    {id:'pistol',code:'"1"',name:'Pistol',plays:[
      {id:'p11',code:'"11"',name:'Give - Baseline Drive'},
      {id:'p12',code:'"12"',name:'Keep - Middle Drive'},
      {id:'p13',code:'"13"',name:'Flare Screen - Shoot / Drive'},
      {id:'p14',code:'"14"',name:'Drift Pass - Shoot / Pass'},
      {id:'p15',code:'"15"',name:'Extra Pass - Shoot / Drive'},
    ]},
    {id:'twoside',code:'"2"',name:'Two-Side',plays:[
      {id:'p21',code:'"21"',name:'Extra Pass - Shot'},
      {id:'p22',code:'"22"',name:'Open Ball Screen'},
      {id:'p23',code:'"23"',name:'Stagger Twirl'},
      {id:'p24',code:'"24"',name:'Strong Ball Screen'},
      {id:'p25',code:'"25"',name:'Double Drag'},

const SK={roster:'bd_roster_v1',plans:'bd_plans_v1'};
const load=k=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}};
const persist=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

const S={
  roster:load(SK.roster)||[],
  plans:load(SK.plans)||[],
  view:'home',
  plan:null,
  showRoster:false,
  confirmDel:null,
  openGroups:{},
  showDropFor:null,
  savedMsg:false,
  rNum:'',rName:'',rType:'varsity',rErr:'',
  pendingImport:null,
};

const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const fmtDate=d=>{try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d||'';}};
const mkPlan=(opp='',date='')=>({id:uid(),opponent:opp,date,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),selections:{}});
const grpIds=grp=>grp.subs?grp.subs.flatMap(s=>s.plays.map(p=>p.id)):grp.plays.map(p=>p.id);
const selCount=plan=>Object.keys(plan.selections||{}).length;
const isOpen=id=>S.openGroups[id]!==false;

function setState(patch){
  const sy=window.scrollY;
  Object.assign(S,patch);
  if(patch.roster!==undefined)persist(SK.roster,S.roster);
  if(patch.plans!==undefined)persist(SK.plans,S.plans);
  render();
  window.scrollTo(0,sy);
}

function render(){
  let html='';
  if(S.view==='home')    html=renderHome();
  if(S.view==='builder') html=renderBuilder();
  if(S.view==='print')   html=renderPrint();
  if(S.showRoster)       html+=renderRosterModal();
  document.getElementById('app').innerHTML=html;
  attachHandlers();
}

function renderGroupBlock(grp,sec){
  const color=grp.color||sec.color;
  const bg=grp.bg||sec.bg;
  const ids=grpIds(grp);
  const sn=ids.filter(id=>S.plan.selections[id]!==undefined).length;
  const allOn=sn===ids.length;
  const open=isOpen(grp.id);
  return`
  <div class="grp-row" style="background:${bg};border-color:#ddd;border-left:3.5px solid ${color}" data-a="toggle-grp-open" data-gid="${grp.id}">
    <span style="color:#aaa;font-size:10px;width:10px">${open?'&#9662;':'&#9658;'}</span>
    <span class="grp-code" style="color:${color}">${esc(grp.code)}</span>
    <span class="grp-name">${esc(grp.name)}</span>
    <button class="grp-toggle" data-a="toggle-all" data-ids="${ids.join(',')}" data-allon="${allOn}" onclick="event.stopPropagation()">${allOn?'Deselect All':'Select All'}</button>
    <span style="font-size:11px;color:var(--mgray);min-width:32px;text-align:right">${sn}/${ids.length}</span>
  </div>
  ${open?(grp.subs
    ?grp.subs.map(sub=>renderSubBlock(sub,color)).join('')
    :grp.plays.map((play,i)=>renderPlayRow(play,color,i%2===1,false)).join('')
  ):''}`;
}

function renderSubBlock(sub,color){
  return`
  <div class="sub-hdr" style="border-color:${color}">
    <span style="font-weight:bold;font-size:10px;color:${color}">${esc(sub.code)}</span>
    <span style="color:var(--navy);font-weight:bold;font-size:11px">${esc(sub.name)}</span>
  </div>
  ${sub.plays.map((play,i)=>renderPlayRow(play,color,i%2===1,true)).join('')}`;
}

function renderPlayRow(play,color,alt,indent){
  const sel=S.plan.selections[play.id]!==undefined;
  const assigned=S.plan.selections[play.id]||[];
  const bg=play.ctr?'#f3eeff':alt?'#fafafa':'#fff';
  const available=S.roster.filter(r=>!assigned.includes(r.id)).sort((a,b)=>a.number-b.number);
  const showDrop=S.showDropFor===play.id;
  return`<div class="play-row" style="background:${bg}">
    <div class="play-main${indent?' indent':''}">
      <input type="checkbox" class="play-cb" ${sel?'checked':''} style="accent-color:${color}" data-a="toggle-play" data-pid="${play.id}">
      <span class="play-code${play.ctr?' ctr':''}">${esc(play.code)}</span>
      <span class="play-name${play.ctr?' ctr':''}">${esc(play.name)}</span>
    </div>
    ${sel?`<div class="play-assign${indent?' indent':''}">
      <span class="assign-label">Players:</span>
      ${assigned.map(rid=>{
        const pl=S.roster.find(r=>r.id===rid);
        return pl?`<span class="player-chip">#${pl.number} ${esc(pl.name)}<button class="chip-x" data-a="remove-player" data-pid="${play.id}" data-rid="${rid}">&#10005;</button></span>`:'';
      }).join('')}
      ${!showDrop&&available.length>0?`<button class="add-player-btn" data-a="show-drop" data-pid="${play.id}">+ Player</button>`:''}
      ${showDrop?`<select class="player-select" data-a="assign-player" data-pid="${play.id}">
        <option value="">Select player...</option>
        ${available.map(r=>`<option value="${r.id}">#${r.number} ${esc(r.name)}</option>`).join('')}
      </select>`:''}
      ${S.roster.length===0?`<span style="color:#ccc;font-size:11px">No players in roster</span>`:''}
    </div>`:''}
  </div>`;
}

function renderPrint(){
  const p=S.plan;
  const getPlayers=pid=>(p.selections[pid]||[]).map(id=>S.roster.find(r=>r.id===id)).filter(Boolean).sort((a,b)=>a.number-b.number);

  const activeSecs=SYSTEM.map(sec=>{
    const groups=sec.groups.map(grp=>{
      if(grp.subs){
        const subs=grp.subs.map(sub=>{const plays=sub.plays.filter(pl=>p.selections[pl.id]!==undefined);return plays.length?{...sub,plays}:null;}).filter(Boolean);
        return subs.length?{...grp,subs,plays:undefined}:null;
      }
      const plays=grp.plays.filter(pl=>p.selections[pl.id]!==undefined);
      return plays.length?{...grp,plays}:null;
    }).filter(Boolean);
    return groups.length?{...sec,groups}:null;
  }).filter(Boolean);

  const total=selCount(p);
  const BACK_IDS=['ob','zone','press'];
  const frontSecs=activeSecs.filter(s=>!BACK_IDS.includes(s.id));
  const backSecs=activeSecs.filter(s=>BACK_IDS.includes(s.id));
  const frontCols=Math.min(frontSecs.length,3)||1;
  const backCols=Math.min(backSecs.length,3)||1;

  const renderSecs=secs=>secs.map(sec=>{
    const sc=sec.color;
    return`<div class="card-col">
      <div class="card-sec-hdr" style="background:#0A1E3C;border-color:${sc}">
        <span class="card-sec-label" style="color:${sc}">${esc(sec.label)}</span>
      </div>
      ${sec.groups.map(grp=>{
        const gc=grp.color||sec.color;
        const gb=grp.bg||sec.bg;
        return`<div>
          <div class="card-grp-hdr" style="background:${gb};border-color:${gc}">
            <span class="card-grp-code" style="color:${gc}">${esc(grp.code)}</span>
            <span class="card-grp-name">${esc(grp.name)}</span>
          </div>
          ${grp.subs?grp.subs.map(sub=>`
            <div class="card-sub-hdr" style="border-color:${sc}">
              <span class="card-sub-code" style="color:${sc}">${esc(sub.code)}</span>
              <span class="card-sub-name">${esc(sub.name)}</span>
            </div>
            ${sub.plays.map((pl,i)=>renderCardPlay(pl,sc,i%2===1,true,getPlayers(pl.id))).join('')}
          `).join('')
          :grp.plays.map((pl,i)=>renderCardPlay(pl,gc,i%2===1,false,getPlayers(pl.id))).join('')}
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  const cardHdr=sub=>`
    <div class="card-hdr">
      <div>
        <div class="card-eyebrow">Bishop Dwenger High School &middot; Fort Wayne, Indiana</div>
        <div class="card-title">Boys' Basketball &mdash; Offensive Game Card${sub?' <span style="font-size:11px;opacity:.6">'+sub+'</span>':''}</div>
      </div>
      <div style="text-align:right">
        <div class="card-opp">vs. ${p.opponent?esc(p.opponent):'&mdash;'}</div>
        <div class="card-date">${p.date?fmtDate(p.date):'&mdash;'}</div>
        <div class="card-coach">Ben Smith &middot; Head Coach</div>
      </div>
    </div>`;

  const footer=`<div class="card-footer"><span class="card-footer-text">Bishop Dwenger Boys' Basketball &middot; Offensive Game Card &middot; Ben Smith &middot; Head Coach</span></div>`;

  return`
  <div class="print-controls no-print">
    <button class="btn btn-ghost btn-sm" data-a="go-builder">&larr; Back</button>
    <span style="color:#fff;font-weight:bold;flex:1">${p.opponent?esc(p.opponent):'Game Plan'} &mdash; Print Preview
      ${total===0?'<span style="color:#f99;font-size:12px;margin-left:10px">&#9888; No plays selected</span>':''}</span>
    <button class="btn btn-gold" onclick="window.print()">&#128424; Print / Save PDF</button>
  </div>
  <div class="print-area">
    ${cardHdr('')}
    ${total===0
      ?`<div class="card-no-plays">No plays selected for this game plan.</div>`
      :`<div class="card-body" style="grid-template-columns:repeat(${frontCols},1fr)">
          ${renderSecs(frontSecs)}
        </div>
        ${footer}
        <div class="back-page" style="page-break-before:always;break-before:page">
          ${cardHdr('(OB &middot; Zone &middot; Press)')}
          ${backSecs.length===0
            ?`<div class="card-no-plays" style="font-size:12px;padding:24px">No OB / Zone / Press plays selected.</div>`
            :`<div class="card-body" style="grid-template-columns:repeat(${backCols},1fr)">
                ${renderSecs(backSecs)}
              </div>`}
          ${footer}
        </div>`
    }
  </div>`;
}

function renderCardPlay(play,color,alt,indent,players){
  const bg=play.ctr?'#f3eeff':alt?'#fafafa':'#fff';
  const cc=play.ctr?'#5B2D8E':'#999';
  return`<div class="card-play${indent?' indent':''}" style="background:${bg}">
    <div class="card-play-line">
      <span class="card-play-code${play.ctr?' ctr':''}" style="color:${cc}">${esc(play.code)}</span>
      <span class="card-play-name${play.ctr?' ctr':''}">${esc(play.name)}</span>
    </div>
    ${players.length?`<div class="card-players">${players.map(pl=>`<span class="card-chip">#${pl.number} ${esc(pl.name)}</span>`).join('')}</div>`:''}
  </div>`;
}

function attachHandlers(){
  const opp=document.getElementById('opp-input');
  const dt=document.getElementById('date-input');
  if(opp) opp.addEventListener('input',e=>{S.plan.opponent=e.target.value;});
  if(dt)  dt.addEventListener('input',e=>{S.plan.date=e.target.value;});
  const rn=document.getElementById('r-num');
  const rname=document.getElementById('r-name');
  const rtype=document.getElementById('r-type');
  if(rn)    rn.addEventListener('input',e=>{S.rNum=e.target.value.replace(/\D/,'');});
  if(rname){rname.addEventListener('input',e=>{S.rName=e.target.value;});
            rname.addEventListener('keydown',e=>{if(e.key==='Enter')doAddPlayer();});}
  if(rtype) rtype.addEventListener('change',e=>{S.rType=e.target.value;});
  document.querySelectorAll('[data-a="assign-player"]').forEach(el=>{
    el.addEventListener('change',e=>{
      const pid=el.dataset.pid;
      const rid=e.target.value;
      if(!rid)return;
      const sel={...S.plan.selections};
      if(!sel[pid])sel[pid]=[];
      if(!sel[pid].includes(rid))sel[pid]=[...sel[pid],rid];
      setState({plan:{...S.plan,selections:sel},showDropFor:null});
    });
  });
  const impFile=document.getElementById('import-file');
  if(impFile) impFile.addEventListener('change',e=>{if(e.target.files[0])doImport(e.target.files[0]);});
}

function handleClick(e){
  if(e.target.id==='modal-overlay'){setState({showRoster:false});return;}
  const el=e.target.closest('[data-a]');
  if(!el)return;
  const a=el.dataset.a;
  if(a==='new-plan')     setState({plan:mkPlan(),view:'builder',openGroups:{},showDropFor:null,savedMsg:false});
  else if(a==='edit-plan'){const p=S.plans.find(x=>x.id===el.dataset.id);setState({plan:{...p},view:'builder',openGroups:{},showDropFor:null,savedMsg:false});}
  else if(a==='print-plan'){const p=S.plans.find(x=>x.id===el.dataset.id);setState({plan:{...p},view:'print'});}
  else if(a==='ask-del')    setState({confirmDel:el.dataset.id});
  else if(a==='cancel-del') setState({confirmDel:null});
  else if(a==='confirm-del'){setState({plans:S.plans.filter(p=>p.id!==el.dataset.id),confirmDel:null});}
  else if(a==='open-roster'){setState({showRoster:true,rNum:'',rName:'',rType:'varsity',rErr:''});}
  else if(a==='close-roster'){setState({showRoster:false});}
  else if(a==='save-roster'){persist(SK.roster,S.roster);setState({showRoster:false});}
  else if(a==='add-player') doAddPlayer();
  else if(a==='del-player') setState({roster:S.roster.filter(r=>r.id!==el.dataset.rid)});
  else if(a==='go-home')    setState({view:'home',plan:null});
  else if(a==='go-builder') setState({view:'builder'});
  else if(a==='go-print')   setState({view:'print'});
  else if(a==='save-plan')  doSavePlan();
  else if(a==='toggle-grp-open'){
    const og={...S.openGroups};
    og[el.dataset.gid]=!isOpen(el.dataset.gid);
    setState({openGroups:og});
  }
  else if(a==='toggle-all'){
    const ids=el.dataset.ids.split(',');
    const allOn=el.dataset.allon==='true';
    const sel={...S.plan.selections};
    ids.forEach(id=>{if(allOn)delete sel[id];else if(sel[id]===undefined)sel[id]=[];});
    setState({plan:{...S.plan,selections:sel},showDropFor:null});
  }
  else if(a==='toggle-play'){
    const pid=el.dataset.pid;
    const sel={...S.plan.selections};
    if(sel[pid]!==undefined)delete sel[pid];else sel[pid]=[];
    setState({plan:{...S.plan,selections:sel},showDropFor:null});
  }
  else if(a==='remove-player'){
    const {pid,rid}=el.dataset;
    const sel={...S.plan.selections};
    sel[pid]=(sel[pid]||[]).filter(x=>x!==rid);
    setState({plan:{...S.plan,selections:sel}});
  }
  else if(a==='show-drop')  setState({showDropFor:el.dataset.pid});
  else if(a==='confirm-import'){
    if(S.pendingImport&&!S.pendingImport.error){
      setState({roster:S.pendingImport.roster,plans:S.pendingImport.plans,pendingImport:null});
    }
  }
  else if(a==='cancel-import') setState({pendingImport:null});
  else if(a==='export-data') doExport();
}

function doAddPlayer(){
  const num=parseInt(S.rNum);
  const name=S.rName.trim();
  if(!S.rNum||!name){setState({rErr:'Number and name are required.'});return;}
  if(S.roster.some(p=>p.number===num)){setState({rErr:`#${num} is already in use.`});return;}
  const roster=[...S.roster,{id:uid(),number:num,name,type:S.rType}];
  setState({roster,rNum:'',rName:'',rType:'varsity',rErr:''});
}

function doSavePlan(){
  const up={...S.plan,updatedAt:new Date().toISOString()};
  const plans=S.plans.some(x=>x.id===up.id)?S.plans.map(x=>x.id===up.id?up:x):[up,...S.plans];
  setState({plans,plan:up,savedMsg:true});
  setTimeout(()=>setState({savedMsg:false}),2200);
}

function doExport(){
  const data={version:1,exportedAt:new Date().toISOString(),roster:S.roster,plans:S.plans};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='saints-gamecard-'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function doImport(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data.roster)||!Array.isArray(data.plans)){
        setState({pendingImport:{error:true}});return;
      }
      setState({pendingImport:data});
    }catch{setState({pendingImport:{error:true}});}
  };
  reader.readAsText(file);
}


// ── AUTO-SIZE ROWS FOR PRINT ──────────────────────────────────────────────────
window.addEventListener('beforeprint', function(){
  if(S.view !== 'print') return;

  // BACK PAGE: stretch OB/Zone/Press rows to fill the page
  var back = document.querySelector('.back-page');
  if(back){
    var cols = Array.from(back.querySelectorAll('.card-col'));
    var maxItems = 0;
    cols.forEach(function(col){
      var n = col.querySelectorAll('.card-play,.card-grp-hdr,.card-sub-hdr,.card-sec-hdr').length;
      if(n > maxItems) maxItems = n;
    });
    if(maxItems){
      // letter 792pt - margins 50pt - header 75pt - footer 22pt
      var avail  = 645;
      var fontPt = 9;
      var itemH  = Math.max(18, Math.floor(avail / maxItems));
      var padPt  = Math.max(3,  Math.floor((itemH - fontPt) / 2));
      var items  = back.querySelectorAll('.card-play,.card-grp-hdr,.card-sub-hdr,.card-sec-hdr');
      Array.from(items).forEach(function(el){
        el.style.setProperty('padding-top',    padPt + 'pt', 'important');
        el.style.setProperty('padding-bottom', padPt + 'pt', 'important');
      });
      back._bpDone = true;
    }
  }

  // FRONT PAGE: stretch rows to fill (front has more content so padding is smaller)
  var front = document.querySelector('.card-body:not(.back-page .card-body)');
  // target all front-page card-play/grp/sub rows
  var frontArea = document.querySelector('.print-area > .card-body');
  if(frontArea){
    var cols2 = Array.from(frontArea.querySelectorAll('.card-col'));
    var maxF = 0;
    cols2.forEach(function(col){
      var n = col.querySelectorAll('.card-play,.card-grp-hdr,.card-sub-hdr,.card-sec-hdr').length;
      if(n > maxF) maxF = n;
    });
    if(maxF){
      var availF = 645;
      var fontF  = 9;
      var itemHF = Math.max(12, Math.floor(availF / maxF));
      var padF   = Math.max(2,  Math.floor((itemHF - fontF) / 2));
      var itemsF = frontArea.querySelectorAll('.card-play,.card-grp-hdr,.card-sub-hdr,.card-sec-hdr');
      Array.from(itemsF).forEach(function(el){
        el.style.setProperty('padding-top',    padF + 'pt', 'important');
        el.style.setProperty('padding-bottom', padF + 'pt', 'important');
      });
      frontArea._bpDone = true;
    }
  }
});

window.addEventListener('afterprint', function(){
  var back = document.querySelector('.back-page');
  if(back && back._bpDone){
    Array.from(back.querySelectorAll('.card-play,.card-grp-hdr,.card-sub-hdr,.card-sec-hdr')).forEach(function(el){
      el.style.removeProperty('padding-top');
      el.style.removeProperty('padding-bottom');
    });
    back._bpDone = false;
  }
  var fa = document.querySelector('.print-area > .card-body');
  if(fa && fa._bpDone){
    Array.from(fa.querySelectorAll('.card-play,.card-grp-hdr,.card-sub-hdr,.card-sec-hdr')).forEach(function(el){
      el.style.removeProperty('padding-top');
      el.style.removeProperty('padding-bottom');
    });
    fa._bpDone = false;
  }
});

document.addEventListener('click',handleClick);
render();
</script>
